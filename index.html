<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Finanzas">
<title>Finanzas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;position:fixed;width:100%;overscroll-behavior:none;touch-action:manipulation;}
body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;-webkit-font-smoothing:antialiased;}
/* Paleta iOS 17 (pasteles oscuros) */
:root{
  --bg:#000;--card:#1C1C1E;--card2:#2C2C2E;--hair:rgba(255,255,255,0.07);
  --txt:#fff;--txt2:#98989F;--txt3:#636366;
  --green:#32D74B;--red:#FF453A;--orange:#FF9F0A;--blue:#0A84FF;--purple:#7D7AFF;--teal:#64D2FF;--pink:#FF6482;--yellow:#FFD426;
}
.swipe-wrap{display:flex;width:300%;height:100vh;transition:transform .4s cubic-bezier(.32,.72,0,1);transform:translateX(-33.3333%);}
.swipe-wrap.pos-deuda{transform:translateX(0);}
.swipe-wrap.pos-finance{transform:translateX(-33.3333%);}
.swipe-wrap.pos-notes{transform:translateX(-66.6666%);}
.screen{width:33.3333%;height:100vh;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.dots{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:50;pointer-events:none;}
.dot{width:7px;height:7px;border-radius:4px;background:rgba(255,255,255,0.22);transition:all .35s cubic-bezier(.32,.72,0,1);}
.dot.active{width:22px;background:#fff;}
/* Finance */
#screen-finance{padding-bottom:100px;}
.header{padding:22px 20px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.logo{font-size:30px;font-weight:800;letter-spacing:-0.8px;}
.month-nav{display:flex;align-items:center;gap:6px;background:rgba(118,118,128,0.24);border-radius:22px;padding:6px 10px;border:none;}
.month-nav button{background:none;border:none;color:#fff;font-size:17px;cursor:pointer;line-height:1;padding:0 4px;font-weight:600;}
.month-label{font-size:13px;color:#fff;font-weight:600;min-width:100px;text-align:center;}
/* Hero card con degradado sutil */
.hero{margin:0 16px 16px;background:linear-gradient(180deg,#1f1f22 0%,#161618 100%);border-radius:26px;padding:22px;border:0.5px solid var(--hair);box-shadow:0 8px 30px rgba(0,0,0,0.4);}
.hero-label{font-size:11px;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px;}
.hero-amount{font-size:46px;font-weight:800;letter-spacing:-1.8px;line-height:1.05;margin-bottom:18px;}
.hero-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.hero-box{background:rgba(118,118,128,0.16);border-radius:16px;padding:12px 9px;min-width:0;overflow:hidden;}
.hero-box-label{font-size:9.5px;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hero-box-val{font-size:12.5px;font-weight:700;letter-spacing:-0.4px;line-height:1.2;white-space:nowrap;overflow:hidden;}
.hero-box-sub{font-size:9px;color:var(--txt3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Segmented control iOS */
.tabs{display:flex;margin:0 16px 16px;background:rgba(118,118,128,0.24);border-radius:13px;padding:2px;gap:0;border:none;}
.tab{flex:1;padding:8px 0;border-radius:11px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:transparent;color:var(--txt2);transition:all .2s;letter-spacing:-0.2px;}
.tab.active{background:#636366;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.section{padding:0 16px;}
.sec-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;padding-left:6px;}
.sec-title span:first-child{font-size:12px;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
.sec-title span:last-child{font-size:13px;font-weight:700;letter-spacing:-0.2px;}
.card{background:var(--card);border-radius:20px;border:0.5px solid var(--hair);overflow:hidden;margin-bottom:13px;}
.row{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;position:relative;}
.row+.row{border-top:0.5px solid var(--hair);}
/* Swipe to delete */
.swipe-item{position:relative;overflow:hidden;}
.swipe-item+.swipe-item{border-top:0.5px solid var(--hair);}
.swipe-content{position:relative;background:var(--card);transition:transform .25s ease;touch-action:pan-y;}
.swipe-content.dragging{transition:none;}
.swipe-content .row{border-top:none!important;}
.swipe-delete-action{position:absolute;top:0;right:0;bottom:0;width:84px;background:var(--red);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;}
/* Badge estilo icono iOS oscuro con degradado */
.badge{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800;text-align:center;line-height:1.15;letter-spacing:-0.3px;box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.12),0 2px 6px rgba(0,0,0,0.3);}
.row-info{flex:1;min-width:0;}
.row-name{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
.row-sub{font-size:12px;color:var(--txt2);margin-top:2px;}
.row-right{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.row-amt{font-size:15px;font-weight:700;letter-spacing:-0.3px;}
.row-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:15px;opacity:0.6;padding:0;line-height:1;}
.row-arr{color:#48484A;font-size:16px;}
/* Status badge */
.status-badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:8px;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;letter-spacing:-0.1px;}
.status-ok{background:rgba(50,215,75,.18);color:var(--green);}
.status-pend{background:rgba(255,69,58,.18);color:var(--red);}
/* Urgency dot */
.urg-dot{width:8px;height:8px;border-radius:4px;flex-shrink:0;}
.urg-green{background:var(--green);}
.urg-ok{background:var(--green);}
.urg-red{background:var(--red);animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.row.paid{opacity:0.5;}
.row.paid .row-name{text-decoration:line-through;text-decoration-color:var(--green);}
.row.paid .badge{filter:grayscale(0.5);}
.day-info{font-size:11px;color:var(--txt2);margin-top:2px;}
.add-row{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-top:0.5px solid var(--hair);}
.add-icon{width:44px;height:44px;border-radius:13px;background:rgba(118,118,128,0.2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;color:var(--txt2);}
.add-label{font-size:15px;color:var(--txt2);font-weight:500;}
.section-fab{width:100%;padding:15px;background:rgba(118,118,128,0.14);border:none;border-radius:16px;color:var(--txt2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:13px;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:-0.2px;}
.empty{text-align:center;padding:20px;color:var(--txt3);font-size:13px;}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-top:0.5px solid var(--hair);}
.res-row span:first-child{font-size:14px;color:var(--txt2);}
.res-row span:last-child{font-size:14px;font-weight:600;letter-spacing:-0.2px;}
.res-total{display:flex;justify-content:space-between;align-items:center;padding:15px 16px;border-top:0.5px solid var(--hair);}
.res-total span:first-child{font-size:15px;font-weight:600;}
.res-total span:last-child{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
/* Notes modernas */
#screen-notes{background:#000;display:flex;flex-direction:column;overflow:hidden!important;height:100vh;position:relative;}
.notes-topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 0;flex-shrink:0;}
.notes-circle{width:38px;height:38px;border-radius:19px;background:rgba(118,118,128,0.24);border:none;color:#FFD426;font-size:22px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.notes-bigtitle{padding:6px 20px 14px;flex-shrink:0;}
.notes-h1{font-size:34px;font-weight:800;letter-spacing:-1px;}
.notes-count{font-size:14px;color:var(--txt2);margin-top:2px;font-weight:500;}
.notes-list{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 110px;}
.notes-year{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin:18px 4px 10px;}
/* Grupo de notas estilo lista agrupada iOS */
.notes-group{background:var(--card);border-radius:16px;overflow:hidden;}
.note-item{padding:13px 16px;cursor:pointer;position:relative;}
.note-item+.note-item{border-top:0.5px solid var(--hair);margin-left:16px;}
.note-item-inner{padding-right:22px;}
.note-item-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px;overflow:hidden;}
.note-item-title .ntxt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.note-dot{width:11px;height:11px;border-radius:6px;flex-shrink:0;}
.note-item-sub{font-size:13px;color:var(--txt2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.note-item-sub .ndate{color:var(--txt3);}
.note-del{position:absolute;top:50%;right:12px;transform:translateY(-50%);background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;opacity:0.5;}
.notes-empty{text-align:center;padding:60px 20px;color:var(--txt3);}
.notes-empty .big{font-size:50px;margin-bottom:12px;}
/* Barra inferior estilo iOS Notes */
.notes-bottombar{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;gap:12px;padding:10px 18px calc(14px + env(safe-area-inset-bottom,0px));background:linear-gradient(180deg,transparent,#000 40%);}
.notes-search{flex:1;display:flex;align-items:center;gap:8px;background:rgba(118,118,128,0.24);border-radius:22px;padding:0 16px;height:44px;font-size:15px;color:var(--txt2);}
.notes-search input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:16px;font-family:inherit;}
.notes-compose{width:48px;height:48px;border-radius:24px;background:rgba(118,118,128,0.24);border:none;color:#FFD426;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* Modal */
.overlay{position:fixed;left:0;top:0;width:100%;height:100vh;background:rgba(0,0,0,.55);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{position:relative;background:#1C1C1E;border-radius:28px 28px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border:0.5px solid var(--hair);border-bottom:none;transform:translateY(30px);transition:transform .35s cubic-bezier(.32,.72,0,1);-webkit-overflow-scrolling:touch;}
.overlay.open .modal{transform:translateY(0);}
body.kb-open .tarea{min-height:70px;height:70px;}
body.kb-open .drag{display:none;}
.overlay.fullscreen{align-items:stretch;}
.overlay.fullscreen .modal{height:100%;max-height:100%!important;border-radius:0;border:none;transform:translateY(0);display:flex;flex-direction:column;}
.overlay.fullscreen .drag{display:none;}
.overlay.fullscreen .mbody{flex:1;overflow:hidden;display:flex;flex-direction:column;padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));min-height:0;}
textarea.note-area{flex:1;min-height:60px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
body.kb-open textarea.note-area{min-height:40px;}
body.kb-open .overlay.fullscreen .mtitle{margin-bottom:6px;font-size:15px;}
body.kb-open .overlay.fullscreen .lbl{margin-bottom:3px;}
body.kb-open .overlay.fullscreen .tags-row{margin-bottom:8px;}
body.kb-open .overlay.fullscreen .tinput{margin-bottom:8px;}
body.kb-open .overlay.fullscreen .sbtn{margin-top:8px;}
.fs-close{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:17px;background:rgba(118,118,128,0.28);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;}
.drag{width:36px;height:5px;background:rgba(255,255,255,0.18);border-radius:3px;margin:10px auto 18px;}
.mbody{padding:0 20px 44px;}
.mhead{display:flex;align-items:center;gap:13px;margin-bottom:22px;}
.mhead-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;letter-spacing:-0.5px;box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.12);}
.mtitle{font-size:20px;font-weight:800;margin-bottom:18px;letter-spacing:-0.5px;}
.ttype{display:flex;gap:0;margin-bottom:18px;background:rgba(118,118,128,0.24);border-radius:12px;padding:2px;}
.ttype button{flex:1;padding:9px 0;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:transparent;color:var(--txt2);transition:all .2s;}
.ttype button.active{background:#636366;color:#fff;}
.ttype button.active.rec{background:rgba(50,215,75,0.9);color:#fff;}
.lbl{font-size:13px;color:var(--txt2);font-weight:500;margin-bottom:8px;letter-spacing:-0.2px;}
.ainput{width:100%;background:rgba(118,118,128,0.2);border:none;border-radius:14px;padding:14px 16px;color:#fff;font-size:26px;font-weight:700;font-family:inherit;outline:none;margin-bottom:16px;letter-spacing:-0.5px;}
.tinput{width:100%;background:rgba(118,118,128,0.2);border:none;border-radius:14px;padding:13px 16px;color:#fff;font-size:16px;font-family:inherit;outline:none;margin-bottom:16px;}
.ninput{width:100%;background:rgba(118,118,128,0.2);border:none;border-radius:14px;padding:13px 16px;color:#fff;font-size:16px;font-family:inherit;outline:none;margin-bottom:16px;}
.tarea{width:100%;background:rgba(118,118,128,0.2);border:none;border-radius:14px;padding:13px 16px;color:#fff;font-size:16px;font-family:inherit;outline:none;margin-bottom:16px;resize:none;min-height:110px;line-height:1.5;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px;}
.day-btn{padding:8px 0;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;background:rgba(118,118,128,0.2);color:var(--txt2);}
.day-btn.sel{background:rgba(50,215,75,.25);color:var(--green);}
.cat-list{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
.cat-opt{display:flex;align-items:center;gap:12px;padding:13px 14px;background:rgba(118,118,128,0.16);border-radius:14px;border:1.5px solid transparent;cursor:pointer;transition:all .15s;}
.cat-opt.sel{border-color:var(--purple);background:rgba(125,122,255,.18);}
.cat-opt-emoji{font-size:22px;width:30px;text-align:center;}
.cat-opt-name{font-size:15px;font-weight:600;letter-spacing:-0.2px;}
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px;}
.color-dot{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s;}
.color-dot.sel{border-color:#fff;transform:scale(1.15);}
.sbtn{width:100%;padding:16px;border:none;border-radius:16px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-0.3px;}
.del-btn{width:100%;padding:14px;border:none;border-radius:16px;color:var(--red);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;background:rgba(255,69,58,0.14);margin-top:10px;}
.tags-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.tag-btn{padding:8px 15px;border-radius:20px;border:none;background:rgba(118,118,128,0.2);color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.deu-row{padding:12px 0;border-bottom:0.5px solid var(--hair);}
.deu-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px;}
.deu-row-left{flex:1;min-width:0;}
.deu-row-left .dname{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-0.2px;}
.deu-row-left .dsub{font-size:12px;color:var(--txt2);margin-top:2px;}
.deu-amt{font-size:16px;font-weight:700;color:var(--orange);white-space:nowrap;flex-shrink:0;letter-spacing:-0.3px;}
.deu-amt.ok{color:var(--green);}
.deu-row-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;}
.deu-btn{background:rgba(50,215,75,.18);color:var(--green);border:none;border-radius:9px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit;white-space:nowrap;}
.deu-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:15px;opacity:0.6;padding:0;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(44,44,46,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:16px;padding:11px 20px;font-size:14px;font-weight:500;color:#fff;z-index:200;white-space:nowrap;border:0.5px solid var(--hair);opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.toast.show{opacity:1;}
/* Card familiar */
.card{box-shadow:0 2px 12px rgba(0,0,0,0.2);}
</style>
</head>
<body>
<div class="swipe-wrap pos-finance" id="swipeWrap">

<!-- ══ PANTALLA 0: DEUDA FAMILIAR ══ -->
<div class="screen" id="screen-deuda">
  <div class="header">
    <div class="logo" style="display:flex;align-items:center;gap:9px"><span class="ic" data-ic="users" data-sz="26"></span>Familia</div>
    <button class="notes-back" onclick="goToFinance()">Finanzas →</button>
  </div>
  <div style="display:flex;gap:8px;padding:0 20px;margin-bottom:16px">
    <button onclick="openRespaldoFam()" style="background:rgba(118,118,128,0.24);border:none;border-radius:14px;flex:1;height:42px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit"><span class="ic" data-ic="save"></span>Respaldo familiar</button>
  </div>
  <div class="hero">
    <div id="fam-ring" style="margin-bottom:16px"></div>
    <div class="hero-grid">
      <div class="hero-box">
        <div class="hero-box-label">Prestado</div>
        <div class="hero-box-val" id="fam-prestado" style="color:#fff">—</div>
      </div>
      <div class="hero-box">
        <div class="hero-box-label">✓ Pagado</div>
        <div class="hero-box-val" id="fam-pagado" style="color:var(--green)">—</div>
      </div>
      <div class="hero-box">
        <div class="hero-box-label">Restante</div>
        <div class="hero-box-val" id="fam-restante" style="color:var(--orange)">—</div>
      </div>
    </div>
  </div>
  <div class="section" id="fam-list"></div>
  <div style="padding:0 20px 100px">
    <button class="section-fab" onclick="openNewPrestamo()" style="color:var(--orange);background:rgba(255,159,10,.14)">＋ Agregar préstamo familiar</button>
  </div>
</div>

<!-- ══ PANTALLA 1: FINANZAS ══ -->
<div class="screen" id="screen-finance">
  <div class="header">
    <div class="logo">Finanzas</div>
    <div class="month-nav">
      <button onclick="prevMo()">‹</button>
      <span class="month-label" id="mlabel"></span>
      <button onclick="nextMo()">›</button>
    </div>
  </div>
  <div style="display:flex;gap:8px;padding:0 20px;margin-bottom:16px">
    <button id="notifBtn" onclick="requestNotifPermission()" style="background:rgba(118,118,128,0.24);border:none;border-radius:14px;flex:1;height:42px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit"><span class="ic" data-ic="bell"></span>Avisos</button>
    <button onclick="exportCalendar()" style="background:rgba(118,118,128,0.24);border:none;border-radius:14px;flex:1;height:42px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit"><span class="ic" data-ic="calendar"></span>Calendario</button>
    <button onclick="openRespaldo()" style="background:rgba(118,118,128,0.24);border:none;border-radius:14px;flex:1;height:42px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit"><span class="ic" data-ic="save"></span>Respaldo</button>
  </div>
  <div class="hero">

// ── Migración: convierte pagos recurrentes del modelo viejo (since) al nuevo (agenda) ──
(function migratePagos(){
  let changed=false;
  Object.keys(pagos).forEach(k=>{
    if(!k.startsWith("r-"))return;
    const t=pagos[k];
    if(!t||typeof t!=="object")return;
    // Si es recurrente viejo (tiene since pero no nextMonth), migrar
    if(t.nextMonth===undefined){
      const now=new Date();
      let ny=now.getFullYear(),nm=now.getMonth();
      // Si tiene 'since', usar ese mes como punto de partida
      if(t.since&&typeof t.since==="string"&&t.since.indexOf("-")>=0){
        const[sy,sm]=t.since.split("-").map(Number);
        if(!isNaN(sy)&&!isNaN(sm)){ny=sy;nm=sm;}
      }
      pagos[k]={
        amount:t.amount||0,
        day:t.day||1,
        rec:true,
        repsMode:t.repsMode||"fijo",
        totalReps:t.totalReps||undefined,
        paymentsMade:t.paymentsMade||0,
        nextYear:ny,
        nextMonth:nm,
      };
      if((t.repsMode||"fijo")==="variable")pagos[k]._curAmount=t.amount||0;
      changed=true;
    }
  });
  if(changed)sv("fin_p",pagos);
})();


function resStore(store,key){
  // 1) Pago único guardado específicamente para el mes que se está viendo
  if(store[mk()])return store[mk()];
  // 2) Ingreso recurrente: se muestra SIEMPRE desde su mes de inicio en adelante
  const t=store["r-"+key];
  if(!t)return null;
  // Si no tiene fecha de inicio válida, mostrarlo siempre (recurrente sin límite)
  if(!t.since||typeof t.since!=="string"||t.since.indexOf("-")<0)return t;
  const[sy,sm]=t.since.split("-").map(Number);
  if(isNaN(sy)||isNaN(sm))return t;
  // Mostrar si el mes visto es igual o posterior al mes de inicio
  return (yr*12+mo)>=(sy*12+sm)?t:null;
}
function monthsBetween(sy,sm,ty,tm){return(ty-sy)*12+(tm-sm);}
function resPago(id){
  try{
    // 1) Pago único guardado para CUALQUIER mes (busca todas las claves de este id)
    //    Se muestra siempre, con su propia fecha, sin importar el mes que estés viendo.
    let unicoKey=null,unico=null;
    for(const k in pagos){
      if(k==="r-"+id)continue;
      if(k.endsWith("-"+id)){
        const v=pagos[k];
        if(v&&!v.rec){
          // clave formato "YYYY-M-id"
          const parts=k.split("-");
          if(parts.length>=3){
            const ky=parseInt(parts[0]),km=parseInt(parts[1]);
            if(!isNaN(ky)&&!isNaN(km)){
              // tomar el pago único más próximo no pagado
              if(!unico){unicoKey=k;unico={...v,uY:ky,uM:km};}
            }
          }
        }
      }
    }
    if(unico)return{...unico,rec:false,_isOverride:true,_scheduled:true,nextYear:unico.uY,nextMonth:unico.uM};
    // 2) Pago recurrente (modelo agenda)
    const t=pagos["r-"+id];if(!t)return null;
    if(t.nextMonth!==undefined){
      const made=t.paymentsMade||0;
      const total=t.totalReps||0;
      const remaining=total?Math.max(0,total-made):null;
      if(total&&remaining<=0)return null; // liquidado
      const needsCapture=t.repsMode==="variable"&&!t._curAmount;
      return{
        amount:t.repsMode==="variable"?(t._curAmount||0):t.amount,
        rec:true,day:t.day,
        nextYear:t.nextYear,nextMonth:t.nextMonth,
        totalReps:total||undefined,repsMode:t.repsMode,
        remaining:remaining!==null?remaining:undefined,
        paymentsMade:made,
        _needsCapture:needsCapture&&total>0,
        _scheduled:true
      };
    }
    // 3) Modelo viejo (compatibilidad)
    if(!t.since||typeof t.since!=="string"||t.since.indexOf("-")<0){
      return{amount:t.amount||0,rec:true,day:t.day||null};
    }
    const[sy,sm]=t.since.split("-").map(Number);
    if(isNaN(sy)||isNaN(sm))return{amount:t.amount||0,rec:true,day:t.day||null};
    if(new Date(yr,mo,1)<new Date(sy,sm,1))return null;
    if(t.totalReps){
      const elapsed=monthsBetween(sy,sm,yr,mo);
      const remaining=t.totalReps-elapsed;
      if(remaining<=0)return null;
      if(t.repsMode==="variable")return{amount:0,rec:true,day:t.day,since:t.since,totalReps:t.totalReps,repsMode:t.repsMode,remaining,_needsCapture:true};
      return{amount:t.amount,rec:true,day:t.day,since:t.since,totalReps:t.totalReps,repsMode:t.repsMode,remaining};
    }
    return t;
  }catch(err){
    const t=pagos["r-"+id];
    return t?{amount:t.amount||0,rec:true,day:t.day||null}:null;
  }
}
function exMo(){

function urgInfoDate(y,m,day){
  if(day==null)return null;
  const t=today();t.setHours(0,0,0,0);
  const payDate=new Date(y,m,day);payDate.setHours(0,0,0,0);
  const diffDays=Math.round((payDate-t)/(1000*60*60*24));
  return{diffDays,payDate};
}
function urgInfo(day){return urgInfoDate(yr,mo,day);}
function fmtDate(y,m,day){
  const MM=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return day+" "+MM[m]+" "+y;
}
function urgDotD(y,m,day,paid){
  if(day==null)return"";
  if(paid)return`<div class="urg-dot urg-ok" title="Al corriente"></div>`;
  const u=urgInfoDate(y,m,day);if(!u)return"";
  const cls=u.diffDays<=7?"urg-red":"urg-green";
  return`<div class="urg-dot ${cls}"></div>`;
}
function urgTextD(y,m,day,paid){
  if(day==null)return"";
  if(paid)return`<span style="color:#30D158;font-size:10px">✓ Al corriente</span>`;
  const u=urgInfoDate(y,m,day);if(!u)return"";
  if(u.diffDays<0)return`<span style="color:#FF375F;font-size:10px">¡Vencido! (era ${fmtDate(y,m,day)})</span>`;
  if(u.diffDays===0)return`<span style="color:#FF375F;font-size:10px">¡Hoy es el pago!</span>`;
  return`<span style="font-size:10px;color:${u.diffDays<=7?"#FF375F":"#30D158"}">Vence ${fmtDate(y,m,day)} · faltan ${u.diffDays}d</span>`;
}
function urgDot(day,paid){return urgDotD(yr,mo,day,paid);}
function urgText(day,paid){return urgTextD(yr,mo,day,paid);}
function pagoKey(id){return mk()+"-paid-"+id;}
function isPagado(id){return!!pagado[pagoKey(id)];}
function normName(s){
  return(s||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
function nameMatch(a,b){
  const na=normName(a),nb=normName(b);
  if(!na||!nb)return false;
  return na===nb||na.includes(nb)||nb.includes(na);
}
function togglePagado(id,e,monto,deudaName){
  e&&e.stopPropagation();
  const t=pagos["r-"+id];
  // Pago recurrente con agenda: avanzar / retroceder el calendario de pagos
  if(t&&t.nextMonth!==undefined&&deudaName!==undefined){
    const periodKey="sched-"+id+"-"+t.nextYear+"-"+t.nextMonth;
    const wasPaid=!!pagado[periodKey];
    if(!wasPaid){
      // marcar pagado: descontar deuda, avanzar agenda
      pagado[periodKey]=true;
      discountDebt(deudaName,monto,true);
      t.paymentsMade=(t.paymentsMade||0)+1;
      // avanzar a siguiente mes
      let nm=t.nextMonth+1,ny=t.nextYear;
      if(nm>11){nm=0;ny++;}
      t.nextMonth=nm;t.nextYear=ny;
      if(t.repsMode==="variable")t._curAmount=0; // pedirá capturar el siguiente
      sv("fin_p",pagos);sv("fin_pagado",pagado);
      render();
      const rem=t.totalReps?Math.max(0,t.totalReps-t.paymentsMade):null;
      showToast(rem!==null?`✅ Pagado · faltan ${rem} pagos`:"✅ Pagado · descontado de deudas");
    }else{
      // deshacer: regresar agenda un mes y devolver deuda
      delete pagado[periodKey];
      let nmth=t.nextMonth-1,ny=t.nextYear;
      if(nmth<0){nmth=11;ny--;}
      t.nextMonth=nmth;t.nextYear=ny;
      t.paymentsMade=Math.max(0,(t.paymentsMade||0)-1);
      discountDebt(deudaName,monto,false);
      sv("fin_p",pagos);sv("fin_pagado",pagado);
      render();showToast("⏳ Pago revertido");
    }
    return;
  }
  // Pago único / modelo viejo
  const wasPaid=isPagado(id);
  pagado[pagoKey(id)]=!wasPaid;
  sv("fin_pagado",pagado);
  if(deudaName){
    const matched=discountDebt(deudaName,monto,!wasPaid);
    render();
    showToast(!wasPaid?(matched?"✅ Pagado · descontado de deudas":"✅ Marcado como pagado"):"⏳ Marcado como pendiente");
    return;
  }
  render();
  showToast(!wasPaid?"✅ Marcado como pagado":"⏳ Marcado como pendiente");
}
function discountDebt(deudaName,monto,paying){
  if(!deudaName)return false;
  let matched=false;
  const d=deudas.find(x=>nameMatch(x.name,deudaName));
  if(d){
    matched=true;
    if(paying&&(d.mesesPagados||0)<(d.totalMeses||0))d.mesesPagados=(d.mesesPagados||0)+1;
    else if(!paying&&(d.mesesPagados||0)>0)d.mesesPagados=(d.mesesPagados||0)-1;
    sv("fin_deudas",deudas);
  }
  const de=deudasExtra.find(x=>nameMatch(x.name,deudaName));
  if(de){
    matched=true;
    if(paying)de.monto=Math.max(0,(de.monto||0)-(monto||0));
    else de.monto=(de.monto||0)+(monto||0);
    sv("fin_deu_extra",deudasExtra);
  }
  return matched;
}
function statusBadge(id,monto,deudaName){
  const ok=isPagado(id);
  const args=`'${id}',event${monto!==undefined?`,${monto},'${(deudaName||"").replace(/'/g,"\\'")}'`:""}`;
  return`<button class="status-badge ${ok?"status-ok":"status-pend"}" onclick="togglePagado(${args})">${ok?"✓ Pagado":"✗ Pendiente"}</button>`;
}

// ── Deudas totales ─────────────────────────────────────
function calcDeudaTotal(){
  let total=0;
  deudas.forEach(d=>{
    const restantes=Math.max(0,(d.totalMeses||0)-(d.mesesPagados||0));
    total+=restantes*(d.montoPorMes||0);
  });
  deudasExtra.forEach(d=>total+=d.monto||0);
  return total;
}
function calcDeudaOriginal(){
  // El máximo histórico de deuda registrado, para medir progreso
  let original=ld("fin_deu_orig")||0;
  const actual=calcDeudaTotal();
  if(actual>original){original=actual;sv("fin_deu_orig",original);}
  return original;
}
function deudaProgreso(){
  const orig=calcDeudaOriginal();
  if(orig<=0)return 0;
  const actual=calcDeudaTotal();
  const pagado=orig-actual;
  return Math.max(0,Math.min(100,(pagado/orig)*100));
}

// ── Swipe to delete ────────────────────────────────────
function attachSwipeHandlers(){
  document.querySelectorAll(".swipe-item").forEach(item=>{
    const content=item.querySelector(".swipe-content");
    if(!content||content._swipeBound)return;
    content._swipeBound=true;
    let sx=0,sy=0,dx=0,dragging=false,opened=false;
    const REVEAL=84;
    content.addEventListener("touchstart",e=>{
      sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;dragging=false;
      content.classList.add("dragging");
    },{passive:true});
    content.addEventListener("touchmove",e=>{
      const cx=e.touches[0].clientX,cy=e.touches[0].clientY;
      const ddx=cx-sx,ddy=Math.abs(cy-sy);
      if(!dragging){if(Math.abs(ddx)>ddy&&Math.abs(ddx)>6)dragging=true;else return;}
      dx=ddx;
      let offset=(opened?-REVEAL:0)+dx;
      offset=Math.max(-REVEAL,Math.min(0,offset));
      content.style.transform=`translateX(${offset}px)`;
    },{passive:true});
    content.addEventListener("touchend",()=>{
      content.classList.remove("dragging");
      if(!dragging){return;}
      const finalOffset=(opened?-REVEAL:0)+dx;
      if(finalOffset<-REVEAL/2){
        content.style.transform=`translateX(-${REVEAL}px)`;opened=true;
        // close others
        document.querySelectorAll(".swipe-content").forEach(c=>{if(c!==content){c.style.transform="";c._opened=false;}});
      }else{
        content.style.transform="";opened=false;
      }
    },{passive:true});
  });
}

// Swipe down on drag handle / modal top to close
(function(){
  const modal=document.querySelector(".modal");
  const drag=document.querySelector(".drag");
  let sy=0,dragging=false;
  function ts(e){sy=e.touches[0].clientY;dragging=true;modal.style.transition="none";}
  function tm(e){
    if(!dragging)return;
    const dy=e.touches[0].clientY-sy;
    if(dy>0)modal.style.transform=`translateY(${dy}px)`;
  }
  function te(e){
    if(!dragging)return;
    dragging=false;
    modal.style.transition="";
    const dy=e.changedTouches[0].clientY-sy;
    modal.style.transform="";
    if(dy>80)document.getElementById("overlay").classList.remove("open");
  }
  drag.addEventListener("touchstart",ts,{passive:true});
  drag.addEventListener("touchmove",tm,{passive:true});
  drag.addEventListener("touchend",te,{passive:true});
})();

function getMonthData(y,m){
  const omk=y+"-"+m;
  const oyr=yr,omo=mo; // save
  yr=y;mo=m;
  const sD=resStore(sueldo,"sueldo"),bD=resStore(bono,"bono");
  const sA=sD?.amount||0,bA=bD?.amount||0;
  const pays=allPays().map(p=>{const d=resPago(p.id);return{...p,amount:d?.amount||0};});
  const ex=exMo();
  yr=oyr;mo=omo; // restore
  return{sA,bA,pays,ex,totInc:sA+bA,totG:pays.reduce((s,p)=>s+p.amount,0)+ex.reduce((s,e)=>s+e.amount,0)};
}

// ── Pie: distribución de gastos por categoría/compromiso ──
function drawPie(container,legend,info){
  const sD=resStore(sueldo,"sueldo"),bD=resStore(bono,"bono");
  const sA=sD?.amount||0,bA=bD?.amount||0;
  const pays=allPays().map(p=>{const d=resPago(p.id);return{...p,amount:d?.amount||0,color:p.color};});
  const ex=exMo();
  const items=[
    ...pays.filter(p=>p.amount>0).map(p=>({label:p.name,val:p.amount,color:p.color})),
    ...ex.map(e=>({label:e.desc,val:e.amount,color:e.color||"#FF9F0A"})),
  ];
  const total=items.reduce((s,i)=>s+i.val,0);
  container.innerHTML=`<canvas id="pieCanvas" style="width:100%;height:240px;display:block"></canvas>`;
  const canvas=document.getElementById("pieCanvas");
  const W=canvas.offsetWidth||300,H=240;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  const ctx=canvas.getContext("2d");ctx.scale(devicePixelRatio,devicePixelRatio);
  if(!items.length||total===0){
    ctx.fillStyle="#636366";ctx.font="13px -apple-system,sans-serif";ctx.textAlign="center";
    ctx.fillText("Sin gastos registrados este mes",W/2,H/2);
    legend.innerHTML="";info.innerHTML="Agrega compromisos o gastos extra para ver el desglose.";
    return;
  }
  const cx=W/2,cy=H/2-10,R=Math.min(W,H)/2-20;
  let angle=-Math.PI/2;
  const slices=[];
  items.forEach(it=>{
    const sweep=(it.val/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,angle,angle+sweep);ctx.closePath();
    ctx.fillStyle=it.color;ctx.fill();
    slices.push({...it,start:angle,end:angle+sweep,pct:(it.val/total*100)});
    angle+=sweep;
  });
  // hole for donut
  ctx.beginPath();ctx.arc(cx,cy,R*0.55,0,Math.PI*2);ctx.fillStyle="#1C1C1E";ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 16px monospace";ctx.textAlign="center";
  ctx.fillText(fmt(total),cx,cy+5);
  ctx.fillStyle="#636366";ctx.font="10px -apple-system,sans-serif";
  ctx.fillText("total gastos",cx,cy+20);

  // Legend interactivo
  legend.innerHTML=items.map((it,i)=>`
    <div onclick="highlightSlice(${i})" id="leg-${i}" style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #2C2C2E;cursor:pointer">
      <div style="width:10px;height:10px;border-radius:5px;background:${it.color};flex-shrink:0"></div>
      <div style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.label}</div>
      <div style="font-size:13px;font-weight:600">${fmt(it.val)}</div>
      <div style="font-size:11px;color:#636366;width:42px;text-align:right">${slices[i].pct.toFixed(1)}%</div>
    </div>`).join("");
  info.innerHTML=`Distribución total de tus gastos del mes: <b style="color:#fff">${fmt(total)}</b>. Toca una categoría en la lista para ver su detalle.`;
  window._pieSlices=slices;window._pieCanvas={canvas,ctx,cx,cy,R};
  canvas.onclick=function(e){
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left-cx,y=e.clientY-rect.top-cy;
    const dist=Math.sqrt(x*x+y*y);
    if(dist>R||dist<R*0.55)return;
    let a=Math.atan2(y,x);if(a<-Math.PI/2)a+=Math.PI*2;
    const idx=slices.findIndex(s=>{let st=s.start,en=s.end;if(st<-Math.PI/2)st+=Math.PI*2;if(en<-Math.PI/2)en+=Math.PI*2;return a>=st&&a<=en;});
    if(idx>=0)highlightSlice(idx);
  };
}
window.highlightSlice=function(i){
  const it=window._pieSlices?.[i];if(!it)return;
  document.querySelectorAll('[id^="leg-"]').forEach(el=>el.style.background="");
  const el=document.getElementById("leg-"+i);if(el)el.style.background="rgba(255,255,255,.05)";
  document.getElementById("graf-info").innerHTML=`<b style="color:${it.color}">${it.label}</b>: ${fmt(it.val)} — representa el <b style="color:#fff">${it.pct.toFixed(1)}%</b> de tus gastos totales del mes.`;
};

// ── Bar: ingresos vs gastos por mes (últimos 6 meses) ──
function drawBar(container,legend,info){
  container.innerHTML=`<canvas id="barCanvas" style="width:100%;height:220px;display:block"></canvas>`;
  const canvas=document.getElementById("barCanvas");
  const W=canvas.offsetWidth||300,H=220;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  const ctx=canvas.getContext("2d");ctx.scale(devicePixelRatio,devicePixelRatio);
  const months=[];
  for(let i=5;i>=0;i--){
    let m=mo-i,y=yr;
    while(m<0){m+=12;y--;}
    months.push({y,m,...getMonthData(y,m)});
  }
  const maxV=Math.max(1,...months.map(d=>Math.max(d.totInc,d.totG)));
  const pad={l:36,r:10,t:14,b:28};
  const gw=(W-pad.l-pad.r)/months.length;
  const gh=H-pad.t-pad.b;
  // grid
  ctx.strokeStyle="#2C2C2E";ctx.lineWidth=1;ctx.font="9px monospace";ctx.fillStyle="#636366";
  for(let i=0;i<=4;i++){
    const y=pad.t+gh-(gh*i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.textAlign="right";ctx.fillText(fmt(maxV*i/4).replace("$",""),pad.l-4,y+3);
  }
  const MN=["E","F","M","A","M","J","J","A","S","O","N","D"];
  months.forEach((d,i)=>{
    const x0=pad.l+i*gw;
    const bw=gw*0.32;
    const hInc=(d.totInc/maxV)*gh,hGas=(d.totG/maxV)*gh;
    ctx.fillStyle="#30D158";
    ctx.fillRect(x0+gw*0.12,pad.t+gh-hInc,bw,hInc);
    ctx.fillStyle="#FF375F";
    ctx.fillRect(x0+gw*0.56,pad.t+gh-hGas,bw,hGas);
    ctx.fillStyle="#8E8E93";ctx.font="10px -apple-system,sans-serif";ctx.textAlign="center";
    ctx.fillText(MN[d.m]+(i===5?" •":""),x0+gw/2,H-8);
  });
  legend.innerHTML=`
    <div style="display:flex;gap:16px;justify-content:center;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:10px;height:10px;border-radius:3px;background:#30D158"></div>Ingresos</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:10px;height:10px;border-radius:3px;background:#FF375F"></div>Gastos</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${months.map((d,i)=>{
        const bal=d.totInc-d.totG,bc=bal>=0?"#30D158":"#FF375F";
        return`<div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid #2C2C2E">
          <span style="color:#8E8E93">${MONTHS[d.m]} ${d.y}</span>
          <span>↑${fmt(d.totInc)} · ↓${fmt(d.totG)} · <b style="color:${bc}">${bal>=0?"+":"-"}${fmt(bal)}</b></span>
        </div>`;
      }).join("")}
    </div>`;
  const cur=months[months.length-1];
  info.innerHTML=`Comparativo de los últimos 6 meses. Este mes: ingresos <b style="color:#30D158">${fmt(cur.totInc)}</b>, gastos <b style="color:#FF375F">${fmt(cur.totG)}</b>.`;
}

// ── Line: tendencia de balance y deuda total ──
function drawLine(container,legend,info){
  container.innerHTML=`<canvas id="lineCanvas" style="width:100%;height:220px;display:block"></canvas>`;
  const canvas=document.getElementById("lineCanvas");
  const W=canvas.offsetWidth||300,H=220;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  const ctx=canvas.getContext("2d");ctx.scale(devicePixelRatio,devicePixelRatio);
  const months=[];
  for(let i=5;i>=0;i--){
    let m=mo-i,y=yr;
    while(m<0){m+=12;y--;}
    const d=getMonthData(y,m);
    months.push({y,m,balance:d.totInc-d.totG});
  }
  const totDeu=calcDeudaTotal();
  const vals=months.map(d=>d.balance);
  const minV=Math.min(0,...vals),maxV=Math.max(1,...vals);
  const pad={l:42,r:10,t:14,b:28};
  const gw=(W-pad.l-pad.r)/(months.length-1);
  const gh=H-pad.t-pad.b;
  const range=maxV-minV||1;
  const yFor=v=>pad.t+gh-((v-minV)/range)*gh;
  // grid + zero line
  ctx.strokeStyle="#2C2C2E";ctx.lineWidth=1;ctx.font="9px monospace";ctx.fillStyle="#636366";
  for(let i=0;i<=4;i++){
    const v=minV+range*i/4,y=yFor(v);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.textAlign="right";ctx.fillText(fmt(v).replace("$",""),pad.l-4,y+3);
  }
  // line
  ctx.beginPath();ctx.strokeStyle="#5E5CE6";ctx.lineWidth=2;
  months.forEach((d,i)=>{
    const x=pad.l+i*gw,y=yFor(d.balance);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
  // points
  const MN=["E","F","M","A","M","J","J","A","S","O","N","D"];
  months.forEach((d,i)=>{
    const x=pad.l+i*gw,y=yFor(d.balance);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=d.balance>=0?"#30D158":"#FF375F";ctx.fill();
    ctx.fillStyle="#8E8E93";ctx.font="10px -apple-system,sans-serif";ctx.textAlign="center";
    ctx.fillText(MN[d.m],x,H-8);
  });
  const cur=months[months.length-1];
  legend.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #2C2C2E">
      <span style="font-size:13px;color:#8E8E93">Balance este mes</span>
      <span style="font-size:15px;font-weight:700;color:${cur.balance>=0?"#30D158":"#FF375F"}">${cur.balance>=0?"+":"-"}${fmt(cur.balance)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #2C2C2E">
      <span style="font-size:13px;color:#8E8E93">⚠ Deuda total actual</span>
      <span style="font-size:15px;font-weight:700;color:#FF9F0A">${fmt(totDeu)}</span>
    </div>`;
  info.innerHTML=`Esta línea muestra cómo ha cambiado tu balance mensual (ingresos − gastos) en los últimos 6 meses. Un valor positivo significa que te sobró dinero ese mes.`;
}

window.saveIncome=function(type){
  const val=parseFloat(document.getElementById("f-amt").value);
  if(!val||val<=0){showToast("⚠ Escribe el monto");return;}
  const rec=!!document.querySelector(".ttype .active.rec");
  const day=parseInt(document.getElementById("sel-day")?.value)||null;
  const entry={amount:val,rec,day,since:mk()};
  if(type==="sueldo"){if(rec){sueldo["r-sueldo"]=entry;delete sueldo[mk()];}else sueldo[mk()]=entry;sv("fin_s",sueldo);}
  else{if(rec){bono["r-bono"]=entry;delete bono[mk()];}else bono[mk()]=entry;sv("fin_b",bono);}
  closeModal();showToast("✅ Ingreso guardado");render();
};
window.savePago=function(id){
  const val=parseFloat(document.getElementById("f-amt").value);
  if(!val||val<=0){showToast("⚠ Escribe el monto del pago");return;}
  const recBtn=document.querySelectorAll(".ttype")[0]?.querySelector(".active.rec");
  const rec=!!recBtn;
  const day=parseInt(document.getElementById("sel-day")?.value)||null;
  if(!day){showToast("⚠ Elige el día del pago");return;}
  let startMonth=parseInt(document.getElementById("f-month")?.value);
  let startYear=parseInt(document.getElementById("f-year")?.value);
  if(isNaN(startMonth))startMonth=mo;
  if(isNaN(startYear))startYear=yr;
  const tmpl=pagos["r-"+id];
  const curD=resPago(id);
  // Captura de monto variable para el pago en curso (modelo agenda)
  if(curD&&curD._needsCapture&&tmpl&&tmpl.nextMonth!==undefined){
    tmpl._curAmount=val;tmpl.day=day;
    sv("fin_p",pagos);closeModal();showToast("✅ Monto capturado");render();return;
  }
  if(rec){
    const totalReps=parseInt(document.getElementById("f-reps")?.value)||0;
    const repsMode=document.getElementById("f-repsmode")?.value||"fijo";
    const entry={
      amount:val,day,rec:true,repsMode,
      totalReps:totalReps>0?totalReps:undefined,
      paymentsMade:0,
      nextYear:startYear,
      nextMonth:startMonth,
    };
    if(repsMode==="variable")entry._curAmount=val;
    // limpiar cualquier pago único suelto de este id para que no haya conflicto
    Object.keys(pagos).forEach(k=>{if(k!=="r-"+id&&k.endsWith("-"+id))delete pagos[k];});
    pagos["r-"+id]=entry;
    sv("fin_p",pagos);closeModal();
    showToast("✅ Pago recurrente guardado");
    render();
  }else{
    // Pago único: limpiar plantilla recurrente y otros únicos de este id
    delete pagos["r-"+id];
    Object.keys(pagos).forEach(k=>{if(k!=="r-"+id&&k.endsWith("-"+id))delete pagos[k];});
    pagos[startYear+"-"+startMonth+"-"+id]={amount:val,rec:false,day};
    sv("fin_p",pagos);closeModal();
    if(startYear!==yr||startMonth!==mo){
      showToast("✅ Guardado para "+MONTHS[startMonth]+" "+startYear);
    }else{
      showToast("✅ Pago guardado");
    }
    render();
  }
};
window.saveExtra=function(){

window.delIncome=function(type){
  const nombre=type==="sueldo"?"sueldo base":"bono mensual";

    ?`¿Eliminar tu ${nombre} recurrente? Dejará de aparecer en todos los meses.`
    :`¿Eliminar tu ${nombre} de este mes?`;

window.delPago=function(id){
  Object.keys(pagos).forEach(k=>{if(k==="r-"+id||k.endsWith("-"+id))delete pagos[k];});
  Object.keys(pagado).forEach(k=>{if(k.endsWith("-paid-"+id)||k.startsWith("sched-"+id+"-"))delete pagado[k];});
  const esFijo=FIXED_PAYS.some(p=>p.id===id);
  if(esFijo){
    // Compromiso fijo: ocultarlo de la lista
    if(!hiddenFixed.includes(id)){hiddenFixed.push(id);sv("fin_hidden",hiddenFixed);}
  }else{
    // Compromiso personalizado: eliminarlo por completo
    customPays=customPays.filter(p=>p.id!==id);sv("fin_cp",customPays);
  }
  sv("fin_p",pagos);sv("fin_pagado",pagado);showToast("🗑 Compromiso eliminado");render();
};

// Marcar pagado un gasto extra recurrente: baja el contador y avanza la fecha
window.toggleExtraPaid=function(id){
  const e=extras.find(x=>x.id===id);if(!e)return;
  if(!e.rec){
    const wasPaid=isPagado("ex_"+id);
    pagado[pagoKey("ex_"+id)]=!wasPaid;sv("fin_pagado",pagado);render();
    showToast(!wasPaid?"✅ Pagado":"⏳ Pendiente");return;
  }
  // Recurrente: avanzar agenda al siguiente mes
  if(e.totalReps)e.paymentsMade=(e.paymentsMade||0)+1;
  let nm=(e.payMonth!==undefined?e.payMonth:mo)+1;
  let ny=(e.payYear!==undefined?e.payYear:yr);
  if(nm>11){nm=0;ny++;}
  e.payMonth=nm;e.payYear=ny;
  e.month=ny+"-"+nm;if(e.since)e.since=ny+"-"+nm;
  sv("fin_e",extras);render();
  const rem=e.totalReps?Math.max(0,e.totalReps-e.paymentsMade):null;
  if(rem!==null&&rem<=0)showToast("✅ Pago final · gasto liquidado");
  else if(rem!==null)showToast(`✅ Pagado · faltan ${rem} pagos · próximo ${e.day} ${MONTHS[nm].toLowerCase()}`);
  else showToast(`✅ Pagado · próximo ${e.day} ${MONTHS[nm].toLowerCase()}`);
};

// ── Íconos SVG estilo iOS 17 (línea, monocromáticos) ──
function svgIcon(name,color,size){
  const c=color||"#fff";const sw=2;const sz=size||19;
  const wrap=(inner)=>`<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">${inner}</svg>`;
  switch(name){
    case"bell":return wrap(`<path d="M12 3a5 5 0 0 0-5 5v3.5c0 .9-.4 1.8-1 2.5l-.5.6c-.6.7-.1 1.9.9 1.9h11.2c1 0 1.5-1.2.9-1.9l-.5-.6c-.6-.7-1-1.6-1-2.5V8a5 5 0 0 0-5-5Z" stroke="${c}" stroke-width="${sw}" stroke-linejoin="round"/><path d="M10 19a2 2 0 0 0 4 0" stroke="${c}" stroke-width="${sw}" stroke-linecap="round"/>`);
    case"calendar":return wrap(`<rect x="3.5" y="5" width="17" height="15" rx="3" stroke="${c}" stroke-width="${sw}"/><path d="M3.5 9.5h17M8 3v3.5M16 3v3.5" stroke="${c}" stroke-width="${sw}" stroke-linecap="round"/><circle cx="8" cy="13.5" r="1.1" fill="${c}"/><circle cx="12" cy="13.5" r="1.1" fill="${c}"/><circle cx="16" cy="13.5" r="1.1" fill="${c}"/>`);
    case"save":return wrap(`<path d="M5 4h11l3 3v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z" stroke="${c}" stroke-width="${sw}" stroke-linejoin="round"/><path d="M8 4v5h7V4M8 20v-6h8v6" stroke="${c}" stroke-width="${sw}" stroke-linejoin="round"/>`);
    case"briefcase":return wrap(`<rect x="3" y="7.5" width="18" height="12" rx="2.5" stroke="${c}" stroke-width="${sw}"/><path d="M8.5 7.5V6a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v1.5M3 12.5h18" stroke="${c}" stroke-width="${sw}" stroke-linecap="round"/>`);
    case"trophy":return wrap(`<path d="M7 4h10v4a5 5 0 0 1-10 0V4Z" stroke="${c}" stroke-width="${sw}" stroke-linejoin="round"/><path d="M7 5.5H4.5a1 1 0 0 0-1 1V8a3 3 0 0 0 3 3M17 5.5h2.5a1 1 0 0 1 1 1V8a3 3 0 0 1-3 3M12 13v3M9 20h6M10 20v-1.5a2 2 0 0 1 4 0V20" stroke="${c}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"/>`);
    case"users":return wrap(`<circle cx="9" cy="8" r="3" stroke="${c}" stroke-width="${sw}"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0M16 6.5a3 3 0 0 1 0 5.8M16.5 14.5a5.5 5.5 0 0 1 4 4.5" stroke="${c}" stroke-width="${sw}" stroke-linecap="round"/>`);
    default:return"";
  }
}
window.filterNotes=function(q){_noteFilter=(q||"").toLowerCase();renderNotes();};
function renderNotes(){
  const list=document.getElementById("notes-list");
  const countEl=document.getElementById("notes-count");
  let arr=Object.values(notas||{});
  // Filtro de búsqueda
  if(_noteFilter){
    arr=arr.filter(n=>((n.title||"")+" "+(n.body||"")).toLowerCase().includes(_noteFilter));
  }
  if(countEl)countEl.textContent=Object.keys(notas||{}).length+(Object.keys(notas||{}).length===1?" nota":" notas");
  if(arr.length===0){
    list.innerHTML=_noteFilter
      ?`<div class="notes-empty"><div class="big">🔍</div><p>Sin resultados</p></div>`
      :`<div class="notes-empty"><div class="ios-notes-icon">${iosNotesIconSVG()}</div><p style="margin-top:16px">Desliza desde Finanzas<br>para anotar pendientes e ideas.</p></div>`;
    return;
  }
  arr.sort((a,b)=>b.date-a.date);
  // Agrupar por año
  const grupos={};
  arr.forEach(n=>{
    const y=new Date(n.date).getFullYear();
    (grupos[y]=grupos[y]||[]).push(n);
  });
  const años=Object.keys(grupos).sort((a,b)=>b-a);
  list.innerHTML=años.map(year=>{
    const items=grupos[year].map(n=>{
      const tag=NOTE_TAGS.find(t=>t.id===n.tag)||NOTE_TAGS[4];
      const d=new Date(n.date);
      const ds=d.toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"2-digit"});
      const preview=(n.body||"").replace(/\n/g," ").trim().slice(0,50)||"Sin texto adicional";
      return`<div class="note-item" onclick="openEditNote('${n.id}')">
        <div class="note-item-inner">
          <div class="note-item-title"><span class="note-dot" style="background:${tag.color}"></span><span class="ntxt">${n.title||"Sin título"}</span></div>
          <div class="note-item-sub"><span class="ndate">${ds}</span>  ${preview}</div>
        </div>
        <button class="note-del" onclick="event.stopPropagation();delNote('${n.id}')">✕</button>
      </div>`;
    }).join("");
    return`<div class="notes-year">${year}</div><div class="notes-group">${items}</div>`;
  }).join("");
}

function renderFam(){
  const list=document.getElementById("fam-list");if(!list)return;
  const t=famTotales();
  const setT=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  setT("fam-prestado",fmt(t.prestado));
  setT("fam-pagado",fmt(t.pagado));
  setT("fam-restante",fmt(t.restante));
  const pct=t.prestado>0?Math.round((t.pagado/t.prestado)*100):0;
  const ringEl=document.getElementById("fam-ring");
  if(ringEl)ringEl.innerHTML=ring(pct,{size:150,stroke:14,c1:"#32D74B",c2:"#64D2FF",label:"liquidado",
    center:`<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="font-size:11px;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Te falta</div>
      <div style="font-size:24px;font-weight:800;letter-spacing:-0.8px;color:var(--orange);margin:2px 0">${fmt(t.restante)}</div>
      <div style="font-size:11px;color:var(--green);font-weight:700">${pct}% liquidado</div>
    </div>`});

  if(prestamos.length===0){list.innerHTML=`<div class="empty">Sin préstamos · usa el botón de abajo</div>`;return;}
  list.innerHTML=prestamos.map(p=>{
    const pagadoP=(p.abonos||[]).reduce((s,a)=>s+a.monto,0);
    const restanteP=p.monto-pagadoP;
    const pctP=p.monto>0?Math.round((pagadoP/p.monto)*100):0;
    const liquidado=restanteP<=0;
    const abonosHTML=(p.abonos||[]).length
      ? p.abonos.slice().sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||"")).map((a,idx)=>{
          const realIdx=p.abonos.indexOf(a);
          return`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:0.5px solid var(--hair)">
            <div style="flex:1">
              <div style="font-size:14px;color:var(--green);font-weight:700">+${fmt(a.monto)}</div>
              <div style="font-size:11px;color:var(--txt3)">${famFecha(a.fecha)}${a.nota?" · "+a.nota:""}</div>
            </div>
            <button onclick="openEditAbono('${p.id}',${realIdx})" style="background:none;border:none;color:var(--txt2);font-size:15px;padding:4px 8px;cursor:pointer">✎</button>
          </div>`;
        }).join("")
      : `<div style="font-size:12px;color:var(--txt3);padding:9px 0;border-top:0.5px solid var(--hair)">Aún no se abona nada</div>`;
    return`<div class="card" style="padding:18px;margin:0 20px 13px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div style="flex:1">
          <div style="font-size:17px;font-weight:700;letter-spacing:-0.3px">${p.name}</div>
          <div style="font-size:12px;color:var(--txt2)">${p.concepto}</div>
        </div>
        <button onclick="openEditPrestamo('${p.id}')" style="background:none;border:none;color:var(--txt2);font-size:16px;padding:2px 6px;cursor:pointer">✎</button>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;margin:12px 0 7px">
        <span style="color:var(--txt2)">Prestó <b style="color:#fff">${fmt(p.monto)}</b></span>
        ${liquidado?`<span style="color:var(--green);font-weight:700">✓ Liquidado</span>`:`<span style="color:var(--orange);font-weight:700">Restan ${fmt(restanteP)}</span>`}
      </div>
      <div style="height:8px;background:rgba(118,118,128,0.22);border-radius:4px;overflow:hidden;margin-bottom:5px">
        <div style="height:100%;width:${pctP}%;background:${liquidado?"linear-gradient(90deg,#32D74B,#64D2FF)":"linear-gradient(90deg,#FF9F0A,#FFD426)"};border-radius:4px;transition:width .6s cubic-bezier(.32,.72,0,1)"></div>
      </div>
      <div style="font-size:11px;color:var(--txt3);text-align:right;margin-bottom:10px">${pctP}% pagado</div>
      <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin:8px 0 2px">Abonos</div>
      ${abonosHTML}
      <button onclick="openNewAbono('${p.id}')" style="width:100%;margin-top:12px;padding:11px;background:rgba(50,215,75,.16);border:none;border-radius:12px;color:var(--green);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">＋ Registrar abono</button>
    </div>`;
  }).join("");
}

}

// ── Exportar recordatorios al Calendario (.ics) ──────────
window.exportCalendar=function(){
  const events=[];
  // Compromisos fijos con día asignado
  allPays().forEach(p=>{
    const d=resPago(p.id)||pagos["r-"+p.id];
    if(!d||!d.day)return;
    const montoTxt=d.amount?fmt(d.amount):(d.repsMode==="variable"?"monto variable":"");
    events.push({name:"Pago "+p.name,day:d.day,desc:montoTxt?("Monto: "+montoTxt):"Registra el pago en tu app Finanzas"});
  });
  // Gastos extra recurrentes con día
  extras.forEach(e=>{
    if(e.rec&&e.day)events.push({name:"Pago "+e.desc,day:e.day,desc:"Monto: "+fmt(e.amount)});
  });
  if(!events.length)return showToast("⚠ No hay pagos con día asignado");

  const pad2=n=>String(n).padStart(2,"0");
  const now=new Date();
  const stamp=now.getFullYear()+pad2(now.getMonth()+1)+pad2(now.getDate())+"T"+pad2(now.getHours())+pad2(now.getMinutes())+"00";
  let ics="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Finanzas App//ES\r\nCALSCALE:GREGORIAN\r\n";
  events.forEach((ev,i)=>{
    // Primera ocurrencia: este mes (o el próximo si el día ya pasó)
    let y=now.getFullYear(),m=now.getMonth();
    if(now.getDate()>ev.day){m++;if(m>11){m=0;y++;}}
    const day=Math.min(ev.day,28); // evitar problemas con meses cortos
    const dt=y+pad2(m+1)+pad2(day);
    ics+="BEGIN:VEVENT\r\n";
    ics+="UID:finanzas-"+i+"-"+stamp+"@finanzas.app\r\n";
    ics+="DTSTAMP:"+stamp+"\r\n";
    ics+="DTSTART;VALUE=DATE:"+dt+"\r\n";
    ics+="RRULE:FREQ=MONTHLY;BYMONTHDAY="+day+"\r\n";
    ics+="SUMMARY:💳 "+ev.name+"\r\n";
    ics+="DESCRIPTION:"+ev.desc.replace(/,/g,"\\,")+"\r\n";
    // Alarma 3 días antes a las 9am
    ics+="BEGIN:VALARM\r\nTRIGGER:-P3D\r\nACTION:DISPLAY\r\nDESCRIPTION:⏰ En 3 días: "+ev.name+"\r\nEND:VALARM\r\n";
    // Alarma el mismo día a las 9am (evento all-day: trigger PT9H desde inicio)
    ics+="BEGIN:VALARM\r\nTRIGGER:PT9H\r\nACTION:DISPLAY\r\nDESCRIPTION:🔴 Hoy: "+ev.name+"\r\nEND:VALARM\r\n";
    ics+="END:VEVENT\r\n";
  });
  ics+="END:VCALENDAR\r\n";
  const blob=new Blob([ics],{type:"text/calendar"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="Recordatorios-Finanzas.ics";
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
  showToast("📅 Abre el archivo para añadir al Calendario");
};

// ── Respaldo de datos ────────────────────────────────────
const BACKUP_KEYS=["fin_s","fin_b","fin_p","fin_e","fin_cp","fin_cats","fin_notes","fin_pagado","fin_deudas","fin_deu_extra","fin_deu_orig","fin_notif_sent"];
function buildBackupJSON(){
  // 1) Forzar guardado del estado actual en memoria a localStorage
  try{
    sv("fin_s",sueldo);sv("fin_b",bono);sv("fin_p",pagos);sv("fin_e",extras);
    sv("fin_cp",customPays);sv("fin_cats",customCats);sv("fin_notes",notas);
    sv("fin_pagado",pagado);sv("fin_deudas",deudas);sv("fin_deu_extra",deudasExtra);
    sv("fin_hidden",hiddenFixed);sv("fam_prestamos",prestamos);
  }catch(e){}
  const data={_app:"Finanzas",_version:1,_date:new Date().toISOString(),data:{}};
  // 2) Respaldar TODA clave que empiece con "fin_" o "fam_" (finanzas + deuda familiar)
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&(k.startsWith("fin_")||k.startsWith("fam_"))){
      const v=localStorage.getItem(k);
      if(v!==null)data.data[k]=v;
    }
  }
  return JSON.stringify(data,null,2);
}
function backupResumen(){
  const nPagos=Object.keys(pagos).length;
  const nDeudas=deudas.length+deudasExtra.length;
  const nNotas=Object.keys(notas||{}).length;
  const nExtras=extras.length;
  const nCustom=customPays.length;
  const nCats=customCats.length;
  const nPrestamos=prestamos.length;
  return{nPagos,nDeudas,nNotas,nExtras,nCustom,nCats,nPrestamos};
}

    </div>`);

window.copyBackup=async function(){
  const json=buildBackupJSON();
  try{
    await navigator.clipboard.writeText(json);
    showToast("✅ Copiado · pégalo en una nota de Notas");
    return;
  }catch(err){}
  // Fallback con textarea temporal
  try{
    const ta=document.createElement("textarea");
    ta.value=json;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.focus();ta.select();
    const ok=document.execCommand("copy");
    document.body.removeChild(ta);
    showToast(ok?"✅ Copiado · pégalo en Notas":"⚠ No se pudo copiar");
  }catch(err2){showToast("⚠ No se pudo copiar");}
};
function esStandalone(){
  return (window.navigator.standalone===true)||(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches);
}
window.exportBackup=async function(){
  const json=buildBackupJSON();
  const d=new Date();
  const p=n=>String(n).padStart(2,"0");
  const fecha=d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());
  const hora=p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());
  const fname="Respaldo-Finanzas-"+fecha+"-"+hora+".txt";

  // En modo app instalada (standalone), la descarga directa NO funciona en iOS.
  // Usar la hoja de compartir, que sí funciona ahí.
  if(esStandalone()){
    try{
      const file=new File([json],fname,{type:"text/plain"});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file]});
        showToast("✅ Elige 'Guardar en Archivos' → Guardar");
        return;
      }
      // Si no se puede compartir archivo, compartir el texto
      if(navigator.share){
        await navigator.share({title:fname,text:json});
        showToast("✅ Elige dónde guardar tu respaldo");
        return;
      }
    }catch(err){
      if(err&&err.name==="AbortError"){showToast("Se canceló · intenta de nuevo");return;}
    }
    // Último recurso en standalone: copiar al portapapeles
    try{
      await navigator.clipboard.writeText(json);
      showToast("✅ Copiado · pégalo en una nota de Notas");
      return;
    }catch(e){}
    showToast("⚠ Usa 'Copiar para pegar en Notas'");
    return;
  }

  // En Safari normal: descarga directa (va directo a Archivos, igual que el HTML)
  try{
    const blob=new Blob([json],{type:"text/plain"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=fname;a.style.display="none";
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
    showToast("✅ Respaldo descargado a Archivos");
  }catch(err){
    showToast("⚠ Usa 'Copiar para pegar en Notas'");
  }
};
window.pasteRestore=async function(){
  try{
    const txt=await navigator.clipboard.readText();
    if(!txt||!txt.trim()){showToast("⚠ No hay nada copiado para pegar");return;}
    aplicarRestore(JSON.parse(txt));
    closeModal();render();renderNotes();
    showToast("✅ Datos restaurados correctamente");
  }catch(err){
    showToast("⚠ Copia primero un respaldo válido");
  }
};
function aplicarRestore(parsed){
  if(typeof parsed==="string")parsed=JSON.parse(parsed);
  if(!parsed||!parsed.data||parsed._app!=="Finanzas")throw new Error("invalid");
  Object.keys(parsed.data).forEach(k=>{
    if(k&&(k.startsWith("fin_")||k.startsWith("fam_")))localStorage.setItem(k,parsed.data[k]);
  });
  sueldo=ld("fin_s")||{};bono=ld("fin_b")||{};pagos=ld("fin_p")||{};
  extras=ld("fin_e")||[];customPays=ld("fin_cp")||[];notas=ld("fin_notes")||{};
  customCats=ld("fin_cats")||CATS_BASE.map(c=>({...c}));
  hiddenFixed=ld("fin_hidden")||[];
  pagado=ld("fin_pagado")||{};deudas=ld("fin_deudas")||[];deudasExtra=ld("fin_deu_extra")||[];
  prestamos=ld("fam_prestamos")||[];
  renderFam();
}
window.importBackup=function(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      aplicarRestore(JSON.parse(e.target.result));
      closeModal();render();renderNotes();
      showToast("✅ Datos restaurados correctamente");
    }catch(err){showToast("⚠ Archivo no válido o dañado");}
  };
  reader.onerror=function(){showToast("⚠ No se pudo leer el archivo");};
  reader.readAsText(file);
};

// ── Recordatorios de pago (notificaciones) ───────────────
async function setupNotifications(){
  if(!("Notification" in window))return;
  updateNotifBtn();
}
function updateNotifBtn(){
  const btn=document.getElementById("notifBtn");if(!btn)return;
  if(!("Notification" in window)){btn.style.display="none";return;}
  const ico=color=>`<span style="display:inline-flex;align-items:center">${svgIcon("bell",color,19)}</span>Avisos`;
  if(Notification.permission==="granted"){btn.innerHTML=ico("#32D74B");btn.style.color="#30D158";btn.title="Recordatorios activados";}
  else if(Notification.permission==="denied"){btn.innerHTML=ico("#8E8E93");btn.style.opacity="0.5";btn.title="Notificaciones bloqueadas. Activa en Ajustes de Safari.";}
  else{btn.innerHTML=ico("#fff");btn.style.opacity="0.95";btn.title="Toca para activar recordatorios de pago";}
}
window.requestNotifPermission=async function(){
  if(!("Notification" in window))return showToast("Tu navegador no soporta notificaciones");
  if(Notification.permission==="granted"){showToast("✅ Recordatorios ya activados");checkPaymentReminders();return;}
  if(Notification.permission==="denied"){showToast("🔕 Activa notificaciones en Ajustes > Safari");return;}
  const perm=await Notification.requestPermission();
  updateNotifBtn();
  if(perm==="granted"){showToast("✅ Recordatorios activados");checkPaymentReminders();}
  else showToast("🔕 No se activaron las notificaciones");
};
function notifSentKey(id,kind){return"notif-"+mk()+"-"+id+"-"+kind;}
function fireNotification(title,body){
  if(Notification.permission!=="granted")return;
  try{
    if(navigator.serviceWorker&&navigator.serviceWorker.controller){
      navigator.serviceWorker.ready.then(reg=>reg.showNotification(title,{body,icon:"data:,",badge:"data:,",tag:title+body}));
    }else{
      new Notification(title,{body});
    }
  }catch(e){}
}
function checkPaymentReminders(){
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  const sent=ld("fin_notif_sent")||{};
  let changed=false;
  // Compromisos fijos
  allPays().forEach(p=>{
    const d=resPago(p.id);
    if(!d||!d.amount||!d.day)return;
    if(isPagado(p.id))return; // ya pagado, no molestar
    // Usar la fecha REAL programada del pago (nextYear/nextMonth), no el mes en curso
    const uY=d.nextYear!==undefined?d.nextYear:yr;
    const uM=d.nextMonth!==undefined?d.nextMonth:mo;
    const u=urgInfoDate(uY,uM,d.day);if(!u)return;
    if(u.diffDays===3){
      const k=notifSentKey(p.id,"3d-"+uY+"-"+uM);
      if(!sent[k]){
        fireNotification("⏰ Recordatorio de pago",`En 3 días debes pagar ${p.name}: ${fmt(d.amount)}`);
        sent[k]=true;changed=true;
      }
    }
    if(u.diffDays===0){
      const k=notifSentKey(p.id,"hoy-"+uY+"-"+uM);
      if(!sent[k]){
        fireNotification("🔴 Pago hoy",`Hoy es la fecha de pago de ${p.name}: ${fmt(d.amount)}`);
        sent[k]=true;changed=true;
      }
    }
  });
  // Gastos extra
  exMo().forEach(e=>{
    if(!e.day)return;
    if(isPagado("ex_"+e.id))return;
    const uY=e.payYear!==undefined?e.payYear:yr;
    const uM=e.payMonth!==undefined?e.payMonth:mo;
    const u=urgInfoDate(uY,uM,e.day);if(!u)return;
    if(u.diffDays===3){
      const k=notifSentKey("ex_"+e.id,"3d-"+uY+"-"+uM);
      if(!sent[k]){
        fireNotification("⏰ Recordatorio de pago",`En 3 días debes pagar ${e.desc}: ${fmt(e.amount)}`);
        sent[k]=true;changed=true;
      }
    }
    if(u.diffDays===0){
      const k=notifSentKey("ex_"+e.id,"hoy-"+uY+"-"+uM);
      if(!sent[k]){
        fireNotification("🔴 Pago hoy",`Hoy es la fecha de pago de ${e.desc}: ${fmt(e.amount)}`);
        sent[k]=true;changed=true;
      }
    }
  });
  if(changed)sv("fin_notif_sent",sent);
}
setupNotifications();
checkPaymentReminders();
setInterval(checkPaymentReminders,1000*60*60); // revisar cada hora mientras la app está abierta

// Registrar service worker mínimo (permite notificaciones mientras la PWA corre en segundo plano en iOS 16.4+)

if(window.visualViewport){
  const overlay=document.getElementById("overlay");
  function resizeOverlay(){
    const vv=window.visualViewport;
    const kbOpen=vv.height<window.innerHeight*0.80;
    if(overlay.classList.contains("fullscreen")){
      // Notas: SIEMPRE anclado arriba (top:0). Solo se reduce la altura
      // a la zona visible cuando aparece el teclado. Nunca se desplaza.
      overlay.style.top="0px";
      overlay.style.height=vv.height+"px";
      const modal=overlay.querySelector(".modal");
      if(modal){modal.style.height=vv.height+"px";modal.style.maxHeight=vv.height+"px";}
    }else{
      overlay.style.height=vv.height+"px";
      overlay.style.top=vv.offsetTop+"px";
      const modal=overlay.querySelector(".modal");
      if(modal)modal.style.maxHeight=(vv.height*0.92)+"px";
    }
    document.body.classList.toggle("kb-open",kbOpen);
    // Forzar la página a no desplazarse
    window.scrollTo(0,0);
  }
  window.visualViewport.addEventListener("resize",resizeOverlay);
  window.visualViewport.addEventListener("scroll",resizeOverlay);
  window._resizeOverlay=resizeOverlay;
  resizeOverlay();
}

// Evitar que iOS desplace la página al enfocar inputs dentro del modal
window.addEventListener("scroll",()=>{
  if(document.getElementById("overlay").classList.contains("open")){
    window.scrollTo(0,0);
  }
});
document.addEventListener("scroll",()=>{
  if(document.getElementById("overlay").classList.contains("open")){
    window.scrollTo(0,0);
    document.documentElement.scrollTop=0;
    document.body.scrollTop=0;
  }
},true);

// Al enfocar un campo dentro del modal
document.addEventListener("focusin",e=>{
  const ov=document.getElementById("overlay");
  const modal=document.querySelector(".overlay.open .modal");
  if(!modal||!modal.contains(e.target))return;
  if(ov.classList.contains("fullscreen")){
    // Notas: bloquear cualquier desplazamiento de la página al enfocar.
    // iOS intenta desplazar varias veces durante la animación del teclado;
    // lo forzamos de vuelta a 0 repetidamente por ~600ms.
    let n=0;
    const lock=setInterval(()=>{
      window.scrollTo(0,0);
      document.documentElement.scrollTop=0;
      document.body.scrollTop=0;
      if(window._resizeOverlay)window._resizeOverlay();
      if(++n>20)clearInterval(lock);
    },30);
    return;
  }
  setTimeout(()=>{
    try{e.target.scrollIntoView({block:"center",behavior:"smooth"});}catch(err){}
  },300);
});

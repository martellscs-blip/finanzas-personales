<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Finanzas">
<title>Finanzas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;position:fixed;width:100%;}
body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
.swipe-wrap{display:flex;width:200%;height:100vh;transition:transform .35s cubic-bezier(.4,0,.2,1);}
.swipe-wrap.swiped{transform:translateX(-50%);}
.screen{width:50%;height:100vh;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.dots{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:50;pointer-events:none;}
.dot{width:6px;height:6px;border-radius:3px;background:#3A3A3C;transition:all .3s;}
.dot.active{width:18px;background:#fff;}
/* Finance */
#screen-finance{padding-bottom:100px;}
.header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.logo{font-size:26px;font-weight:700;letter-spacing:-0.5px;}
.month-nav{display:flex;align-items:center;gap:8px;background:#1C1C1E;border-radius:20px;padding:5px 12px;border:1px solid #2C2C2E;}
.month-nav button{background:none;border:none;color:#636366;font-size:18px;cursor:pointer;line-height:1;padding:0;}
.month-label{font-size:13px;color:#8E8E93;font-weight:500;min-width:100px;text-align:center;}
.hero{margin:0 16px 14px;background:#1C1C1E;border-radius:20px;padding:18px;border:1px solid #2C2C2E;}
.hero-label{font-size:10px;color:#636366;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.hero-amount{font-size:40px;font-weight:700;letter-spacing:-1px;line-height:1.1;margin-bottom:14px;}
.hero-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.hero-box{background:#2C2C2E;border-radius:12px;padding:10px 8px;min-width:0;overflow:hidden;}
.hero-box-label{font-size:9px;color:#636366;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hero-box-val{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hero-box-sub{font-size:9px;color:#636366;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tabs{display:flex;margin:0 16px 14px;background:#1C1C1E;border-radius:12px;padding:3px;gap:2px;border:1px solid #2C2C2E;}
.tab{flex:1;padding:7px 0;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:-apple-system,sans-serif;background:transparent;color:#636366;}
.tab.active{background:#3A3A3C;color:#fff;}
.section{padding:0 16px;}
.sec-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-left:2px;}
.sec-title span:first-child{font-size:11px;color:#636366;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.sec-title span:last-child{font-size:12px;font-weight:600;}
.card{background:#1C1C1E;border-radius:16px;border:1px solid #2C2C2E;overflow:hidden;margin-bottom:12px;}
.row{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;position:relative;}
.row+.row{border-top:1px solid #2C2C2E;}
/* Swipe to delete */
.swipe-item{position:relative;overflow:hidden;}
.swipe-item+.swipe-item{border-top:1px solid #2C2C2E;}
.swipe-content{position:relative;background:#1C1C1E;transition:transform .25s ease;touch-action:pan-y;}
.swipe-content.dragging{transition:none;}
.swipe-content .row{border-top:none!important;}
.swipe-delete-action{position:absolute;top:0;right:0;bottom:0;width:84px;background:#FF375F;color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;}
.badge{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800;text-align:center;line-height:1.2;letter-spacing:-0.3px;}
.row-info{flex:1;min-width:0;}
.row-name{font-size:14px;font-weight:500;}
.row-sub{font-size:11px;color:#636366;margin-top:2px;}
.row-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.row-amt{font-size:14px;font-weight:600;}
.row-del{background:none;border:none;color:#FF375F;cursor:pointer;font-size:15px;opacity:0.6;padding:0;line-height:1;}
.row-arr{color:#3A3A3C;font-size:15px;}
/* Status badge */
.status-badge{font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;cursor:pointer;border:none;font-family:-apple-system,sans-serif;white-space:nowrap;}
.status-ok{background:rgba(48,209,88,.15);color:#30D158;}
.status-pend{background:rgba(255,55,95,.15);color:#FF375F;}
/* Urgency dot */
.urg-dot{width:8px;height:8px;border-radius:4px;flex-shrink:0;}
.urg-green{background:#30D158;}
.urg-ok{background:#30D158;}
.urg-red{background:#FF375F;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
/* Paid row styling */
.row.paid{opacity:0.55;}
.row.paid .row-name{text-decoration:line-through;text-decoration-color:#30D158;}
.row.paid .badge{filter:grayscale(0.4);}
/* Day info */
.day-info{font-size:10px;color:#8E8E93;margin-top:1px;}
/* Add row */
.add-row{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-top:1px solid #2C2C2E;}
.add-icon{width:42px;height:42px;border-radius:11px;background:#2C2C2E;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;color:#636366;}
.add-label{font-size:14px;color:#636366;}
/* Extra FAB inside section */
.section-fab{width:100%;padding:13px;background:#2C2C2E;border:1.5px dashed #3A3A3C;border-radius:14px;color:#8E8E93;font-size:14px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;}
.empty{text-align:center;padding:18px;color:#636366;font-size:13px;}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-top:1px solid #2C2C2E;}
.res-row span:first-child{font-size:13px;color:#ebebf599;}
.res-row span:last-child{font-size:13px;font-weight:600;}
.res-total{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-top:1px solid #2C2C2E;}
.res-total span:first-child{font-size:14px;font-weight:600;}
.res-total span:last-child{font-size:20px;font-weight:700;}
/* Notes */
#screen-notes{background:#000;display:flex;flex-direction:column;overflow:hidden!important;height:100vh;}
.notes-header{padding:20px 20px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid #1C1C1E;}
.notes-title{font-size:26px;font-weight:700;}
.notes-back{background:#1C1C1E;border:none;color:#8E8E93;font-size:13px;font-weight:600;padding:7px 14px;border-radius:20px;cursor:pointer;font-family:-apple-system,sans-serif;flex-shrink:0;}
.notes-list{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 100px;}
.note-card{background:#1C1C1E;border-radius:14px;border:1px solid #2C2C2E;padding:13px 14px;margin-bottom:9px;cursor:pointer;position:relative;}
.note-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;gap:8px;}
.note-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding:3px 8px;border-radius:6px;flex-shrink:0;}
.note-date{font-size:10px;color:#636366;flex-shrink:0;white-space:nowrap;}
.note-title{font-size:14px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:24px;}
.note-preview{font-size:12px;color:#8E8E93;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.note-del{position:absolute;top:10px;right:10px;background:none;border:none;color:#FF375F;font-size:14px;cursor:pointer;opacity:0.5;}
.notes-empty{text-align:center;padding:50px 20px;color:#636366;}
.notes-empty .big{font-size:44px;margin-bottom:10px;}
.notes-fab{position:fixed;bottom:28px;right:20px;width:52px;height:52px;border-radius:16px;background:#FF9F0A;border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(255,159,10,.5);display:flex;align-items:center;justify-content:center;z-index:10;}
/* Modal */
.overlay{position:fixed;left:0;top:0;width:100%;height:100vh;background:rgba(0,0,0,.7);backdrop-filter:blur(16px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{position:relative;background:#1C1C1E;border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border:1px solid #3A3A3C;border-bottom:none;transform:translateY(30px);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.overlay.open .modal{transform:translateY(0);}
/* Teclado abierto: compactar para que todo quepa */
body.kb-open .tarea{min-height:70px;height:70px;}
body.kb-open .drag{display:none;}
/* Fullscreen top-anchored variant (para notas: el teclado no recorta nada) */
.overlay.fullscreen{align-items:flex-start;}
.overlay.fullscreen .modal{height:100%;max-height:100%!important;border-radius:0;border:none;transform:translateY(0);}
.fs-close{position:absolute;top:14px;right:16px;width:32px;height:32px;border-radius:16px;background:#2C2C2E;border:none;color:#8E8E93;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;}
.drag{width:34px;height:4px;background:#3A3A3C;border-radius:2px;margin:10px auto 16px;}
.mbody{padding:0 20px 44px;}
.mhead{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.mhead-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;letter-spacing:-0.5px;}
.mtitle{font-size:17px;font-weight:600;margin-bottom:14px;}
.ttype{display:flex;gap:5px;margin-bottom:16px;background:#2C2C2E;border-radius:11px;padding:3px;}
.ttype button{flex:1;padding:8px 0;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:-apple-system,sans-serif;background:transparent;color:#636366;}
.ttype button.active{background:#3A3A3C;color:#fff;}
.ttype button.active.rec{color:#30D158;}
.lbl{font-size:12px;color:#8E8E93;font-weight:500;margin-bottom:6px;}
.ainput{width:100%;background:#2C2C2E;border:1px solid #3A3A3C;border-radius:12px;padding:12px 14px;color:#fff;font-size:24px;font-family:monospace;outline:none;margin-bottom:14px;}
.tinput{width:100%;background:#2C2C2E;border:1px solid #3A3A3C;border-radius:12px;padding:11px 14px;color:#fff;font-size:15px;font-family:-apple-system,sans-serif;outline:none;margin-bottom:14px;}
.ninput{width:100%;background:#2C2C2E;border:1px solid #3A3A3C;border-radius:12px;padding:11px 14px;color:#fff;font-size:15px;font-family:monospace;outline:none;margin-bottom:14px;}
.tarea{width:100%;background:#2C2C2E;border:1px solid #3A3A3C;border-radius:12px;padding:11px 14px;color:#fff;font-size:14px;font-family:-apple-system,sans-serif;outline:none;margin-bottom:14px;resize:none;min-height:110px;line-height:1.5;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px;}
.day-btn{padding:6px 0;border-radius:7px;border:1px solid #3A3A3C;cursor:pointer;font-family:monospace;font-size:11px;background:#2C2C2E;color:#636366;}
.day-btn.sel{border-color:#30D158;background:rgba(48,209,88,.18);color:#30D158;}
.cat-list{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
.cat-opt{display:flex;align-items:center;gap:10px;padding:11px 13px;background:#2C2C2E;border-radius:11px;border:1.5px solid transparent;cursor:pointer;}
.cat-opt.sel{border-color:#5E5CE6;background:rgba(94,92,230,.15);}
.cat-opt-emoji{font-size:20px;width:28px;text-align:center;}
.cat-opt-name{font-size:14px;font-weight:500;}
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:14px;}
.color-dot{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
.color-dot.sel{border-color:#fff;transform:scale(1.15);}
.sbtn{width:100%;padding:14px;border:none;border-radius:13px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif;}
.del-btn{width:100%;padding:12px;border:1px solid #FF375F;border-radius:13px;color:#FF375F;font-size:14px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif;background:none;margin-top:9px;}
.tags-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.tag-btn{padding:6px 13px;border-radius:20px;border:1.5px solid #3A3A3C;background:none;color:#636366;font-size:12px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif;}
.deu-row{padding:10px 0;border-bottom:1px solid #2C2C2E;}
.deu-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
.deu-row-left{flex:1;min-width:0;}
.deu-row-left .dname{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.deu-row-left .dsub{font-size:11px;color:#636366;margin-top:2px;}
.deu-amt{font-size:15px;font-weight:700;color:#FF9F0A;white-space:nowrap;flex-shrink:0;}
.deu-amt.ok{color:#30D158;}
.deu-row-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;}
.deu-btn{background:rgba(48,209,88,.15);color:#30D158;border:none;border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;font-weight:600;font-family:-apple-system,sans-serif;white-space:nowrap;}
.deu-del{background:none;border:none;color:#FF375F;cursor:pointer;font-size:14px;opacity:0.6;padding:0;}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.96);backdrop-filter:blur(20px);border-radius:13px;padding:9px 18px;font-size:13px;color:#fff;z-index:200;white-space:nowrap;border:1px solid #3A3A3C;opacity:0;transition:opacity .2s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="swipe-wrap" id="swipeWrap">

<!-- ══ PANTALLA 1: FINANZAS ══ -->
<div class="screen" id="screen-finance">
  <div class="header">
    <div class="logo">Finanzas</div>
    <div class="month-nav">
      <button onclick="prevMo()">‹</button>
      <span class="month-label" id="mlabel"></span>
      <button onclick="nextMo()">›</button>
    </div>
  </div>
  <div style="display:flex;gap:8px;padding:0 20px;margin-bottom:14px">
    <button id="notifBtn" onclick="requestNotifPermission()" style="background:#1C1C1E;border:1px solid #2C2C2E;border-radius:12px;flex:1;height:38px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;color:#8E8E93;cursor:pointer;font-family:-apple-system,sans-serif">🔔 Avisos</button>
    <button onclick="exportCalendar()" style="background:#1C1C1E;border:1px solid #2C2C2E;border-radius:12px;flex:1;height:38px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;color:#8E8E93;cursor:pointer;font-family:-apple-system,sans-serif">📅 Calendario</button>
    <button onclick="openRespaldo()" style="background:#1C1C1E;border:1px solid #2C2C2E;border-radius:12px;flex:1;height:38px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;color:#8E8E93;cursor:pointer;font-family:-apple-system,sans-serif">💾 Respaldo</button>
  </div>
  <div class="hero">
    <div class="hero-label">Disponible este mes</div>
    <div class="hero-amount" id="hero-amt">—</div>
    <div class="hero-grid">
      <div class="hero-box">
        <div class="hero-box-label">↑ Ingresos</div>
        <div class="hero-box-val" id="h-inc" style="color:#30D158">—</div>
      </div>
      <div class="hero-box">
        <div class="hero-box-label">↓ Gastos</div>
        <div class="hero-box-val" id="h-gas" style="color:#FF375F">—</div>
      </div>
      <div class="hero-box" style="cursor:pointer" onclick="openDeudas()">
        <div class="hero-box-label">⚠ Deudas</div>
        <div class="hero-box-val" id="h-deu" style="color:#FF9F0A">—</div>
        <div class="hero-box-sub">Toca para ver</div>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('resumen',this)">Resumen</button>
    <button class="tab" onclick="setTab('ingresos',this)">Ingresos</button>
    <button class="tab" onclick="setTab('gastos',this)">Gastos</button>
  </div>
  <div id="tab-resumen" class="section"></div>
  <div id="tab-ingresos" class="section" style="display:none"></div>
  <div id="tab-gastos" class="section" style="display:none"></div>
</div>

<!-- ══ PANTALLA 2: NOTAS ══ -->
<div class="screen" id="screen-notes">
  <div class="notes-header">
    <div class="notes-title">📝 Notas</div>
    <button class="notes-back" onclick="goToFinance()">← Finanzas</button>
  </div>
  <div class="notes-list" id="notes-list"></div>
  <button class="notes-fab" id="notesFab" onclick="openNewNote()" style="display:none">+</button>
</div>
</div>

<div class="dots"><div class="dot active" id="dot0"></div><div class="dot" id="dot1"></div></div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal"><div class="drag"></div><div class="mbody" id="mbody"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Swipe ──────────────────────────────────────────────
let startX=0,startY=0,swping=false,curScreen=0,startOnRow=false;
const wrap=document.getElementById("swipeWrap");
function goToNotes(){curScreen=1;wrap.classList.add("swiped");updDots();const f=document.querySelector(".notes-fab");if(f)f.style.display="flex";}
function goToFinance(){curScreen=0;wrap.classList.remove("swiped");updDots();const f=document.querySelector(".notes-fab");if(f)f.style.display="none";}
function updDots(){document.getElementById("dot0").classList.toggle("active",curScreen===0);document.getElementById("dot1").classList.toggle("active",curScreen===1);}
document.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;startY=e.touches[0].clientY;swping=false;
  startOnRow=!!e.target.closest(".swipe-content");
},{passive:true});
document.addEventListener("touchmove",e=>{if(!swping&&!startOnRow){const dx=Math.abs(e.touches[0].clientX-startX),dy=Math.abs(e.touches[0].clientY-startY);if(dx>dy&&dx>8)swping=true;}},{passive:true});
document.addEventListener("touchend",e=>{
  if(!swping||startOnRow)return;
  if(document.getElementById("overlay").classList.contains("open"))return;
  const dx=e.changedTouches[0].clientX-startX,dy=Math.abs(e.changedTouches[0].clientY-startY);
  if(Math.abs(dx)<40||dy>60)return;
  if(dx<-40&&curScreen===0)goToNotes();
  else if(dx>40&&curScreen===1)goToFinance();
},{passive:true});

// ── Storage ────────────────────────────────────────────
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function fmt(n){return"$"+Math.abs(n).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});}
function ld(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function initials(n){return n.trim().split(/\s+/).map(w=>w[0]).join("").toUpperCase().slice(0,3);}

const COLORS=["#BF5AF2","#0A84FF","#30D158","#FF9F0A","#FF375F","#FF6B35","#32ADE6","#64D2FF","#FFD60A","#AC8E68","#636366","#5E5CE6"];
const FIXED_PAYS=[
  {id:"nu",       name:"Nu",             short:"NU",  color:"#820AD1",bg:"#2d1b4e"},
  {id:"mcredito", name:"Mercado Crédito",short:"MC",  color:"#0A84FF",bg:"#0a2a3d"},
  {id:"mpago",    name:"Mercado Pago",   short:"MP",  color:"#32ADE6",bg:"#0a2535"},
  {id:"marina",   name:"La Marina",      short:"LM",  color:"#30D158",bg:"#0d2e18"},
  {id:"telcel",   name:"Telcel",         short:"TCL", color:"#0A84FF",bg:"#0d1f3c"},
  {id:"plata",    name:"Plata Card",     short:"PLT", color:"#FF6B35",bg:"#3d1a0a"},
];
const CATS=[
  {id:"med",  name:"Medicamentos",      emoji:"💊"},
  {id:"desp", name:"Despensa",          emoji:"🛒"},

  {id:"casa",    label:"🏠 Casa",       color:"#0A84FF"},
  {id:"compras", label:"🛍 Compras",    color:"#FF9F0A"},

let yr=new Date().getFullYear(),mo=new Date().getMonth(),curTab="resumen";
let sueldo=ld("fin_s")||{}, bono=ld("fin_b")||{}, pagos=ld("fin_p")||{};
let extras=ld("fin_e")||[], customPays=ld("fin_cp")||[];
let notas=ld("fin_notes")||{};
// pagado: {mk-id: bool}
let pagado=ld("fin_pagado")||{};
// deudas: [{id,name,totalMeses,montoPorMes,mesesPagados,extra}]
let deudas=ld("fin_deudas")||[];
// deudas manuales extra
let deudasExtra=ld("fin_deu_extra")||[];

const mk=()=>yr+"-"+mo;
const allPays=()=>[...FIXED_PAYS,...customPays];
const today=()=>new Date();

function resStore(store,key){
  if(store[mk()])return store[mk()];
  const t=store["r-"+key];if(!t)return null;
  const[sy,sm]=t.since.split("-").map(Number);
  return new Date(yr,mo,1)>=new Date(sy,sm,1)?t:null;
}
function monthsBetween(sy,sm,ty,tm){return(ty-sy)*12+(tm-sm);}
function resPago(id){
  // Pago único de este mes
  const ov=pagos[mk()+"-"+id];
  if(ov&&!ov.rec)return{...ov,_isOverride:true};
  const t=pagos["r-"+id];if(!t)return null;
  // Modelo nuevo basado en agenda (tiene nextMonth/nextYear)
  if(t.nextMonth!==undefined){
    const made=t.paymentsMade||0;
    const total=t.totalReps||0;
    const remaining=total?Math.max(0,total-made):null;
    if(total&&remaining<=0)return null; // liquidado
    const needsCapture=t.repsMode==="variable"&&!t._curAmount;
    return{
      amount:t.repsMode==="variable"?(t._curAmount||0):t.amount,
      rec:true,day:t.day,
      nextYear:t.nextYear,nextMonth:t.nextMonth,
      totalReps:total||undefined,repsMode:t.repsMode,
      remaining:remaining!==null?remaining:undefined,
      paymentsMade:made,
      _needsCapture:needsCapture&&total>0,
      _scheduled:true
    };
  }
  // Modelo viejo (compatibilidad)
  if(ov)return{...ov,_isOverride:true};
  const[sy,sm]=t.since.split("-").map(Number);
  if(new Date(yr,mo,1)<new Date(sy,sm,1))return null;
  if(t.totalReps){
    const elapsed=monthsBetween(sy,sm,yr,mo);
    const remaining=t.totalReps-elapsed;
    if(remaining<=0)return null;
    if(t.repsMode==="variable")return{amount:0,rec:true,day:t.day,since:t.since,totalReps:t.totalReps,repsMode:t.repsMode,remaining,_needsCapture:true};
    return{amount:t.amount,rec:true,day:t.day,since:t.since,totalReps:t.totalReps,repsMode:t.repsMode,remaining};
  }
  return t;
}
function exMo(){
  const res=[],seen=new Set();
  extras.forEach(e=>{
    if(e.rec&&e.since){
      const[sy,sm]=e.since.split("-").map(Number);
      if(new Date(yr,mo,1)>=new Date(sy,sm,1)&&!seen.has(e.id)){seen.add(e.id);res.push(e);}
    }else if(e.month===mk()&&!seen.has(e.id)){seen.add(e.id);res.push(e);}
  });
  return res;
}

// ── Urgency helpers ────────────────────────────────────
function urgInfoDate(y,m,day){
  if(day==null)return null;
  const t=today();t.setHours(0,0,0,0);
  const payDate=new Date(y,m,day);payDate.setHours(0,0,0,0);
  const diffDays=Math.round((payDate-t)/(1000*60*60*24));
  return{diffDays,payDate};
}
function urgInfo(day){return urgInfoDate(yr,mo,day);}
function fmtDate(y,m,day){
  const MM=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return day+" "+MM[m]+" "+y;
}
function urgDotD(y,m,day,paid){
  if(day==null)return"";
  if(paid)return`<div class="urg-dot urg-ok" title="Al corriente"></div>`;
  const u=urgInfoDate(y,m,day);if(!u)return"";
  const cls=u.diffDays<=7?"urg-red":"urg-green";
  return`<div class="urg-dot ${cls}"></div>`;
}
function urgTextD(y,m,day,paid){
  if(day==null)return"";
  if(paid)return`<span style="color:#30D158;font-size:10px">✓ Al corriente</span>`;
  const u=urgInfoDate(y,m,day);if(!u)return"";
  if(u.diffDays<0)return`<span style="color:#FF375F;font-size:10px">¡Vencido! (era ${fmtDate(y,m,day)})</span>`;
  if(u.diffDays===0)return`<span style="color:#FF375F;font-size:10px">¡Hoy es el pago!</span>`;
  return`<span style="font-size:10px;color:${u.diffDays<=7?"#FF375F":"#30D158"}">Vence ${fmtDate(y,m,day)} · faltan ${u.diffDays}d</span>`;
}
function urgDot(day,paid){return urgDotD(yr,mo,day,paid);}
function urgText(day,paid){return urgTextD(yr,mo,day,paid);}
function pagoKey(id){return mk()+"-paid-"+id;}
function isPagado(id){return!!pagado[pagoKey(id)];}
function normName(s){
  return(s||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
function nameMatch(a,b){
  const na=normName(a),nb=normName(b);
  if(!na||!nb)return false;
  return na===nb||na.includes(nb)||nb.includes(na);
}
function togglePagado(id,e,monto,deudaName){
  e&&e.stopPropagation();
  const t=pagos["r-"+id];
  // Pago recurrente con agenda: avanzar / retroceder el calendario de pagos
  if(t&&t.nextMonth!==undefined&&deudaName!==undefined){
    const periodKey="sched-"+id+"-"+t.nextYear+"-"+t.nextMonth;
    const wasPaid=!!pagado[periodKey];
    if(!wasPaid){
      // marcar pagado: descontar deuda, avanzar agenda
      pagado[periodKey]=true;
      discountDebt(deudaName,monto,true);
      t.paymentsMade=(t.paymentsMade||0)+1;
      // avanzar a siguiente mes
      let nm=t.nextMonth+1,ny=t.nextYear;
      if(nm>11){nm=0;ny++;}
      t.nextMonth=nm;t.nextYear=ny;
      if(t.repsMode==="variable")t._curAmount=0; // pedirá capturar el siguiente
      sv("fin_p",pagos);sv("fin_pagado",pagado);
      render();
      const rem=t.totalReps?Math.max(0,t.totalReps-t.paymentsMade):null;
      showToast(rem!==null?`✅ Pagado · faltan ${rem} pagos`:"✅ Pagado · descontado de deudas");
    }else{
      // deshacer: regresar agenda un mes y devolver deuda
      delete pagado[periodKey];
      let nmth=t.nextMonth-1,ny=t.nextYear;
      if(nmth<0){nmth=11;ny--;}
      t.nextMonth=nmth;t.nextYear=ny;
      t.paymentsMade=Math.max(0,(t.paymentsMade||0)-1);
      discountDebt(deudaName,monto,false);
      sv("fin_p",pagos);sv("fin_pagado",pagado);
      render();showToast("⏳ Pago revertido");
    }
    return;
  }
  // Pago único / modelo viejo
  const wasPaid=isPagado(id);
  pagado[pagoKey(id)]=!wasPaid;
  sv("fin_pagado",pagado);
  if(deudaName){
    const matched=discountDebt(deudaName,monto,!wasPaid);
    render();
    showToast(!wasPaid?(matched?"✅ Pagado · descontado de deudas":"✅ Marcado como pagado"):"⏳ Marcado como pendiente");
    return;
  }
  render();
  showToast(!wasPaid?"✅ Marcado como pagado":"⏳ Marcado como pendiente");
}
function discountDebt(deudaName,monto,paying){
  if(!deudaName)return false;
  let matched=false;
  const d=deudas.find(x=>nameMatch(x.name,deudaName));
  if(d){
    matched=true;
    if(paying&&(d.mesesPagados||0)<(d.totalMeses||0))d.mesesPagados=(d.mesesPagados||0)+1;
    else if(!paying&&(d.mesesPagados||0)>0)d.mesesPagados=(d.mesesPagados||0)-1;
    sv("fin_deudas",deudas);
  }
  const de=deudasExtra.find(x=>nameMatch(x.name,deudaName));
  if(de){
    matched=true;
    if(paying)de.monto=Math.max(0,(de.monto||0)-(monto||0));
    else de.monto=(de.monto||0)+(monto||0);
    sv("fin_deu_extra",deudasExtra);
  }
  return matched;
}
function statusBadge(id,monto,deudaName){
  const ok=isPagado(id);
  const args=`'${id}',event${monto!==undefined?`,${monto},'${(deudaName||"").replace(/'/g,"\\'")}'`:""}`;
  return`<button class="status-badge ${ok?"status-ok":"status-pend"}" onclick="togglePagado(${args})">${ok?"✓ Pagado":"✗ Pendiente"}</button>`;
}

// ── Deudas totales ─────────────────────────────────────
function calcDeudaTotal(){
  let total=0;
  deudas.forEach(d=>{
    const restantes=Math.max(0,(d.totalMeses||0)-(d.mesesPagados||0));
    total+=restantes*(d.montoPorMes||0);
  });
  deudasExtra.forEach(d=>total+=d.monto||0);
  return total;
}
function calcDeudaOriginal(){
  // El máximo histórico de deuda registrado, para medir progreso
  let original=ld("fin_deu_orig")||0;
  const actual=calcDeudaTotal();
  if(actual>original){original=actual;sv("fin_deu_orig",original);}
  return original;
}
function deudaProgreso(){
  const orig=calcDeudaOriginal();
  if(orig<=0)return 0;
  const actual=calcDeudaTotal();
  const pagado=orig-actual;
  return Math.max(0,Math.min(100,(pagado/orig)*100));
}

// ── Main render ───────────────────────────────────────
function render(){
  const sD=resStore(sueldo,"sueldo"),bD=resStore(bono,"bono");
  const sA=sD?.amount||0,bA=bD?.amount||0,totInc=sA+bA;
  const pays=allPays().map(p=>{const d=resPago(p.id);return{...p,amount:d?.amount||0,rec:d?.rec||false,day:d?.day||null};});
  const totF=pays.reduce((s,p)=>s+p.amount,0);
  const ex=exMo(),totE=ex.reduce((s,e)=>s+e.amount,0);
  const totG=totF+totE,libre=totInc-totG;
  const lc=libre>0?"#30D158":libre<0?"#FF375F":"#fff";
  const totDeu=calcDeudaTotal();
  document.getElementById("mlabel").textContent=MONTHS[mo]+" "+yr;
  const ha=document.getElementById("hero-amt");
  ha.textContent=(libre>=0?"+":"-")+fmt(libre);ha.style.color=lc;
  document.getElementById("h-inc").textContent=totInc?fmt(totInc):"—";
  document.getElementById("h-gas").textContent=totG?fmt(totG):"—";
  document.getElementById("h-deu").textContent=totDeu?fmt(totDeu):"$0";
  renderTab(curTab);
}
function renderTab(t){
  if(t==="resumen")renderResumen();
  else if(t==="ingresos")renderIngresos();
  else renderGastos();
  attachSwipeHandlers();
}

    const d=resPago(p.id);
    return{...p,data:d,amount:d?.amount||0,rec:d?.rec||false,day:d?.day||null,

      scheduled:d?._scheduled,ny:d?.nextYear,nm:d?.nextMonth};
  });
  const totF=pays.reduce((s,p)=>s+p.amount,0);
  const ex=exMo(),totE=ex.reduce((s,e)=>s+e.amount,0);

  const payRows=pays.map(p=>{
    // Estado pagado: para programados usa periodKey, si no usa pagoKey
    let paid=false,badgeFn;
    if(p.scheduled){
      const t=pagos["r-"+p.id];

    const uY=p.scheduled?p.ny:yr,uM=p.scheduled?p.nm:mo;
    const dot=urgDotD(uY,uM,p.day,paid);

    let inner;

        <div class="row-right" style="flex-direction:column;align-items:flex-end;gap:5px">
          <span class="row-arr">›</span>
        </div>
      </div>`;
    }else{
      inner=`
      <div class="row${paid?" paid":""}" onclick="openPago('${p.id}')">
        ${makeBadge(p)}
        <div class="row-info">
          <div class="row-name" style="display:flex;align-items:center;gap:6px">${p.name} ${dot}</div>
          <div class="row-sub">${p.amount?(p.rec?"Recurrente":"Único"):"Toca para registrar"}</div>
          ${p.amount&&p.day?`<div class="day-info">${txt}</div>`:""}
          ${repsInfo}
        </div>
        <div class="row-right" style="flex-direction:column;align-items:flex-end;gap:5px">
          <span class="row-amt" style="color:${p.amount?"#FF375F":"#3A3A3C"}">${p.amount?"-"+fmt(p.amount):"—"}</span>
          ${badgeFn}

        </div>
      </div>`;

    return`<div class="swipe-item">
      <button class="swipe-delete-action" onclick="delPago('${p.id}')">Eliminar</button>
      <div class="swipe-content">${inner}</div>
    </div>`;
  }).join("");

  const exRows=ex.length===0?`<div class="empty">Sin gastos extra · usa el botón de abajo</div>`:ex.map(e=>{
    const paid=isPagado("ex_"+e.id);
    const inner=`

      </div>
      <div class="row-right" style="flex-direction:column;align-items:flex-end;gap:5px">

    return`<div class="swipe-item">
      <button class="swipe-delete-action" onclick="delExtra('${e.id}')">Eliminar</button>
      <div class="swipe-content">${inner}</div>

  document.getElementById("tab-gastos").innerHTML=`
    <div class="sec-title"><span>Compromisos fijos</span>${totF?`<span style="color:#FF375F">-${fmt(totF)}</span>`:""}</div>

// ── Swipe to delete ────────────────────────────────────
function attachSwipeHandlers(){
  document.querySelectorAll(".swipe-item").forEach(item=>{
    const content=item.querySelector(".swipe-content");
    if(!content||content._swipeBound)return;
    content._swipeBound=true;
    let sx=0,sy=0,dx=0,dragging=false,opened=false;
    const REVEAL=84;
    content.addEventListener("touchstart",e=>{
      sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;dragging=false;
      content.classList.add("dragging");
    },{passive:true});
    content.addEventListener("touchmove",e=>{
      const cx=e.touches[0].clientX,cy=e.touches[0].clientY;
      const ddx=cx-sx,ddy=Math.abs(cy-sy);
      if(!dragging){if(Math.abs(ddx)>ddy&&Math.abs(ddx)>6)dragging=true;else return;}
      dx=ddx;
      let offset=(opened?-REVEAL:0)+dx;
      offset=Math.max(-REVEAL,Math.min(0,offset));
      content.style.transform=`translateX(${offset}px)`;
    },{passive:true});
    content.addEventListener("touchend",()=>{
      content.classList.remove("dragging");
      if(!dragging){return;}
      const finalOffset=(opened?-REVEAL:0)+dx;
      if(finalOffset<-REVEAL/2){
        content.style.transform=`translateX(-${REVEAL}px)`;opened=true;
        // close others
        document.querySelectorAll(".swipe-content").forEach(c=>{if(c!==content){c.style.transform="";c._opened=false;}});
      }else{
        content.style.transform="";opened=false;
      }
    },{passive:true});
  });
}

// Swipe down on drag handle / modal top to close
(function(){
  const modal=document.querySelector(".modal");
  const drag=document.querySelector(".drag");
  let sy=0,dragging=false;
  function ts(e){sy=e.touches[0].clientY;dragging=true;modal.style.transition="none";}
  function tm(e){
    if(!dragging)return;
    const dy=e.touches[0].clientY-sy;
    if(dy>0)modal.style.transform=`translateY(${dy}px)`;
  }
  function te(e){
    if(!dragging)return;
    dragging=false;
    modal.style.transition="";
    const dy=e.changedTouches[0].clientY-sy;
    modal.style.transform="";
    if(dy>80)document.getElementById("overlay").classList.remove("open");
  }
  drag.addEventListener("touchstart",ts,{passive:true});
  drag.addEventListener("touchmove",tm,{passive:true});
  drag.addEventListener("touchend",te,{passive:true});
})();

// ── Pie: distribución de gastos por categoría/compromiso ──
function drawPie(container,legend,info){
  const sD=resStore(sueldo,"sueldo"),bD=resStore(bono,"bono");
  const sA=sD?.amount||0,bA=bD?.amount||0;
  const pays=allPays().map(p=>{const d=resPago(p.id);return{...p,amount:d?.amount||0,color:p.color};});
  const ex=exMo();
  const items=[
    ...pays.filter(p=>p.amount>0).map(p=>({label:p.name,val:p.amount,color:p.color})),
    ...ex.map(e=>({label:e.desc,val:e.amount,color:e.color||"#FF9F0A"})),
  ];
  const total=items.reduce((s,i)=>s+i.val,0);
  container.innerHTML=`<canvas id="pieCanvas" style="width:100%;height:240px;display:block"></canvas>`;
  const canvas=document.getElementById("pieCanvas");
  const W=canvas.offsetWidth||300,H=240;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  const ctx=canvas.getContext("2d");ctx.scale(devicePixelRatio,devicePixelRatio);
  if(!items.length||total===0){
    ctx.fillStyle="#636366";ctx.font="13px -apple-system,sans-serif";ctx.textAlign="center";
    ctx.fillText("Sin gastos registrados este mes",W/2,H/2);
    legend.innerHTML="";info.innerHTML="Agrega compromisos o gastos extra para ver el desglose.";
    return;
  }
  const cx=W/2,cy=H/2-10,R=Math.min(W,H)/2-20;
  let angle=-Math.PI/2;
  const slices=[];
  items.forEach(it=>{
    const sweep=(it.val/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,angle,angle+sweep);ctx.closePath();
    ctx.fillStyle=it.color;ctx.fill();
    slices.push({...it,start:angle,end:angle+sweep,pct:(it.val/total*100)});
    angle+=sweep;
  });
  // hole for donut
  ctx.beginPath();ctx.arc(cx,cy,R*0.55,0,Math.PI*2);ctx.fillStyle="#1C1C1E";ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 16px monospace";ctx.textAlign="center";
  ctx.fillText(fmt(total),cx,cy+5);
  ctx.fillStyle="#636366";ctx.font="10px -apple-system,sans-serif";
  ctx.fillText("total gastos",cx,cy+20);

  // Legend interactivo
  legend.innerHTML=items.map((it,i)=>`
    <div onclick="highlightSlice(${i})" id="leg-${i}" style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #2C2C2E;cursor:pointer">
      <div style="width:10px;height:10px;border-radius:5px;background:${it.color};flex-shrink:0"></div>
      <div style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.label}</div>
      <div style="font-size:13px;font-weight:600">${fmt(it.val)}</div>
      <div style="font-size:11px;color:#636366;width:42px;text-align:right">${slices[i].pct.toFixed(1)}%</div>
    </div>`).join("");
  info.innerHTML=`Distribución total de tus gastos del mes: <b style="color:#fff">${fmt(total)}</b>. Toca una categoría en la lista para ver su detalle.`;
  window._pieSlices=slices;window._pieCanvas={canvas,ctx,cx,cy,R};
  canvas.onclick=function(e){
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left-cx,y=e.clientY-rect.top-cy;
    const dist=Math.sqrt(x*x+y*y);
    if(dist>R||dist<R*0.55)return;
    let a=Math.atan2(y,x);if(a<-Math.PI/2)a+=Math.PI*2;
    const idx=slices.findIndex(s=>{let st=s.start,en=s.end;if(st<-Math.PI/2)st+=Math.PI*2;if(en<-Math.PI/2)en+=Math.PI*2;return a>=st&&a<=en;});
    if(idx>=0)highlightSlice(idx);
  };
}
window.highlightSlice=function(i){
  const it=window._pieSlices?.[i];if(!it)return;
  document.querySelectorAll('[id^="leg-"]').forEach(el=>el.style.background="");
  const el=document.getElementById("leg-"+i);if(el)el.style.background="rgba(255,255,255,.05)";
  document.getElementById("graf-info").innerHTML=`<b style="color:${it.color}">${it.label}</b>: ${fmt(it.val)} — representa el <b style="color:#fff">${it.pct.toFixed(1)}%</b> de tus gastos totales del mes.`;
};

// ── Bar: ingresos vs gastos por mes (últimos 6 meses) ──
function drawBar(container,legend,info){
  container.innerHTML=`<canvas id="barCanvas" style="width:100%;height:220px;display:block"></canvas>`;
  const canvas=document.getElementById("barCanvas");
  const W=canvas.offsetWidth||300,H=220;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  const ctx=canvas.getContext("2d");ctx.scale(devicePixelRatio,devicePixelRatio);
  const months=[];
  for(let i=5;i>=0;i--){
    let m=mo-i,y=yr;
    while(m<0){m+=12;y--;}
    months.push({y,m,...getMonthData(y,m)});
  }
  const maxV=Math.max(1,...months.map(d=>Math.max(d.totInc,d.totG)));
  const pad={l:36,r:10,t:14,b:28};
  const gw=(W-pad.l-pad.r)/months.length;
  const gh=H-pad.t-pad.b;
  // grid
  ctx.strokeStyle="#2C2C2E";ctx.lineWidth=1;ctx.font="9px monospace";ctx.fillStyle="#636366";
  for(let i=0;i<=4;i++){
    const y=pad.t+gh-(gh*i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.textAlign="right";ctx.fillText(fmt(maxV*i/4).replace("$",""),pad.l-4,y+3);
  }
  const MN=["E","F","M","A","M","J","J","A","S","O","N","D"];
  months.forEach((d,i)=>{
    const x0=pad.l+i*gw;
    const bw=gw*0.32;
    const hInc=(d.totInc/maxV)*gh,hGas=(d.totG/maxV)*gh;
    ctx.fillStyle="#30D158";
    ctx.fillRect(x0+gw*0.12,pad.t+gh-hInc,bw,hInc);
    ctx.fillStyle="#FF375F";
    ctx.fillRect(x0+gw*0.56,pad.t+gh-hGas,bw,hGas);
    ctx.fillStyle="#8E8E93";ctx.font="10px -apple-system,sans-serif";ctx.textAlign="center";
    ctx.fillText(MN[d.m]+(i===5?" •":""),x0+gw/2,H-8);
  });
  legend.innerHTML=`
    <div style="display:flex;gap:16px;justify-content:center;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:10px;height:10px;border-radius:3px;background:#30D158"></div>Ingresos</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:10px;height:10px;border-radius:3px;background:#FF375F"></div>Gastos</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${months.map((d,i)=>{
        const bal=d.totInc-d.totG,bc=bal>=0?"#30D158":"#FF375F";
        return`<div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid #2C2C2E">
          <span style="color:#8E8E93">${MONTHS[d.m]} ${d.y}</span>
          <span>↑${fmt(d.totInc)} · ↓${fmt(d.totG)} · <b style="color:${bc}">${bal>=0?"+":"-"}${fmt(bal)}</b></span>
        </div>`;
      }).join("")}
    </div>`;
  const cur=months[months.length-1];
  info.innerHTML=`Comparativo de los últimos 6 meses. Este mes: ingresos <b style="color:#30D158">${fmt(cur.totInc)}</b>, gastos <b style="color:#FF375F">${fmt(cur.totG)}</b>.`;
}

// ── Line: tendencia de balance y deuda total ──
function drawLine(container,legend,info){
  container.innerHTML=`<canvas id="lineCanvas" style="width:100%;height:220px;display:block"></canvas>`;
  const canvas=document.getElementById("lineCanvas");
  const W=canvas.offsetWidth||300,H=220;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  const ctx=canvas.getContext("2d");ctx.scale(devicePixelRatio,devicePixelRatio);
  const months=[];
  for(let i=5;i>=0;i--){
    let m=mo-i,y=yr;
    while(m<0){m+=12;y--;}
    const d=getMonthData(y,m);
    months.push({y,m,balance:d.totInc-d.totG});
  }
  const totDeu=calcDeudaTotal();
  const vals=months.map(d=>d.balance);
  const minV=Math.min(0,...vals),maxV=Math.max(1,...vals);
  const pad={l:42,r:10,t:14,b:28};
  const gw=(W-pad.l-pad.r)/(months.length-1);
  const gh=H-pad.t-pad.b;
  const range=maxV-minV||1;
  const yFor=v=>pad.t+gh-((v-minV)/range)*gh;
  // grid + zero line
  ctx.strokeStyle="#2C2C2E";ctx.lineWidth=1;ctx.font="9px monospace";ctx.fillStyle="#636366";
  for(let i=0;i<=4;i++){
    const v=minV+range*i/4,y=yFor(v);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.textAlign="right";ctx.fillText(fmt(v).replace("$",""),pad.l-4,y+3);
  }
  // line
  ctx.beginPath();ctx.strokeStyle="#5E5CE6";ctx.lineWidth=2;
  months.forEach((d,i)=>{
    const x=pad.l+i*gw,y=yFor(d.balance);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
  // points
  const MN=["E","F","M","A","M","J","J","A","S","O","N","D"];
  months.forEach((d,i)=>{
    const x=pad.l+i*gw,y=yFor(d.balance);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=d.balance>=0?"#30D158":"#FF375F";ctx.fill();
    ctx.fillStyle="#8E8E93";ctx.font="10px -apple-system,sans-serif";ctx.textAlign="center";
    ctx.fillText(MN[d.m],x,H-8);
  });
  const cur=months[months.length-1];
  legend.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #2C2C2E">
      <span style="font-size:13px;color:#8E8E93">Balance este mes</span>
      <span style="font-size:15px;font-weight:700;color:${cur.balance>=0?"#30D158":"#FF375F"}">${cur.balance>=0?"+":"-"}${fmt(cur.balance)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #2C2C2E">
      <span style="font-size:13px;color:#8E8E93">⚠ Deuda total actual</span>
      <span style="font-size:15px;font-weight:700;color:#FF9F0A">${fmt(totDeu)}</span>
    </div>`;
  info.innerHTML=`Esta línea muestra cómo ha cambiado tu balance mensual (ingresos − gastos) en los últimos 6 meses. Un valor positivo significa que te sobró dinero ese mes.`;
}

window.saveIncome=function(type){
  const val=parseFloat(document.getElementById("f-amt").value);if(!val||val<=0)return;
  const rec=!!document.querySelector(".ttype .active.rec");
  const day=parseInt(document.getElementById("sel-day")?.value)||null;
  const entry={amount:val,rec,day,since:mk()};
  if(type==="sueldo"){if(rec){sueldo["r-sueldo"]=entry;delete sueldo[mk()];}else sueldo[mk()]=entry;sv("fin_s",sueldo);}
  else{if(rec){bono["r-bono"]=entry;delete bono[mk()];}else bono[mk()]=entry;sv("fin_b",bono);}
  closeModal();showToast("✅ Ingreso guardado");render();
};
window.savePago=function(id){
  const val=parseFloat(document.getElementById("f-amt").value);if(!val||val<=0)return;
  const recBtn=document.querySelectorAll(".ttype")[0]?.querySelector(".active.rec");
  const rec=!!recBtn;
  const day=parseInt(document.getElementById("sel-day")?.value)||null;
  if(!day){showToast("⚠ Elige el día del pago");return;}
  const startMonth=parseInt(document.getElementById("f-month")?.value);
  const startYear=parseInt(document.getElementById("f-year")?.value);
  const tmpl=pagos["r-"+id];
  const curD=resPago(id);
  // Captura de monto variable para el pago en curso (modelo agenda)
  if(curD&&curD._needsCapture&&tmpl&&tmpl.nextMonth!==undefined){
    tmpl._curAmount=val;tmpl.day=day;
    sv("fin_p",pagos);closeModal();showToast("✅ Monto capturado");render();return;
  }
  if(rec){
    const totalReps=parseInt(document.getElementById("f-reps")?.value)||0;
    const repsMode=document.getElementById("f-repsmode")?.value||"fijo";
    const entry={
      amount:val,day,rec:true,repsMode,
      totalReps:totalReps>0?totalReps:undefined,
      paymentsMade:0,
      nextYear:isNaN(startYear)?yr:startYear,
      nextMonth:isNaN(startMonth)?mo:startMonth,
    };
    if(repsMode==="variable")entry._curAmount=val; // primer monto ya capturado
    pagos["r-"+id]=entry;
    delete pagos[mk()+"-"+id];
  }else{
    // pago único en el mes/año elegido
    const umk=(isNaN(startYear)?yr:startYear)+"-"+(isNaN(startMonth)?mo:startMonth);
    pagos[umk+"-"+id]={amount:val,rec:false,day};
    if(umk!==mk())showToast("✅ Pago único registrado en "+MONTHS[startMonth]+" "+startYear);
  }
  sv("fin_p",pagos);closeModal();showToast("✅ Pago guardado");render();
};
window.saveExtra=function(){
  const val=parseFloat(document.getElementById("f-amt").value);if(!val||val<=0)return;
  const rec=!!document.querySelector(".ttype .active.rec");
  const day=parseInt(document.getElementById("sel-day")?.value)||null;
  const catId=document.getElementById("f-cat").value;
  const cat=CATS.find(c=>c.id===catId);
  extras.push({id:Date.now()+"",month:mk(),since:rec?mk():null,amount:val,desc:cat.name,emoji:cat.emoji,color:"#5E5CE6",rec,day});
  sv("fin_e",extras);closeModal();showToast("✅ Gasto agregado");render();
};
window.delIncome=function(type){
  if(type==="sueldo"){delete sueldo[mk()];delete sueldo["r-sueldo"];sv("fin_s",sueldo);}
  else{delete bono[mk()];delete bono["r-bono"];sv("fin_b",bono);}

// ── Exportar recordatorios al Calendario (.ics) ──────────
window.exportCalendar=function(){
  const events=[];
  // Compromisos fijos con día asignado
  allPays().forEach(p=>{
    const d=resPago(p.id)||pagos["r-"+p.id];
    if(!d||!d.day)return;
    const montoTxt=d.amount?fmt(d.amount):(d.repsMode==="variable"?"monto variable":"");
    events.push({name:"Pago "+p.name,day:d.day,desc:montoTxt?("Monto: "+montoTxt):"Registra el pago en tu app Finanzas"});
  });
  // Gastos extra recurrentes con día
  extras.forEach(e=>{
    if(e.rec&&e.day)events.push({name:"Pago "+e.desc,day:e.day,desc:"Monto: "+fmt(e.amount)});
  });
  if(!events.length)return showToast("⚠ No hay pagos con día asignado");

  const pad2=n=>String(n).padStart(2,"0");
  const now=new Date();
  const stamp=now.getFullYear()+pad2(now.getMonth()+1)+pad2(now.getDate())+"T"+pad2(now.getHours())+pad2(now.getMinutes())+"00";
  let ics="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Finanzas App//ES\r\nCALSCALE:GREGORIAN\r\n";
  events.forEach((ev,i)=>{
    // Primera ocurrencia: este mes (o el próximo si el día ya pasó)
    let y=now.getFullYear(),m=now.getMonth();
    if(now.getDate()>ev.day){m++;if(m>11){m=0;y++;}}
    const day=Math.min(ev.day,28); // evitar problemas con meses cortos
    const dt=y+pad2(m+1)+pad2(day);
    ics+="BEGIN:VEVENT\r\n";
    ics+="UID:finanzas-"+i+"-"+stamp+"@finanzas.app\r\n";
    ics+="DTSTAMP:"+stamp+"\r\n";
    ics+="DTSTART;VALUE=DATE:"+dt+"\r\n";
    ics+="RRULE:FREQ=MONTHLY;BYMONTHDAY="+day+"\r\n";
    ics+="SUMMARY:💳 "+ev.name+"\r\n";
    ics+="DESCRIPTION:"+ev.desc.replace(/,/g,"\\,")+"\r\n";
    // Alarma 3 días antes a las 9am
    ics+="BEGIN:VALARM\r\nTRIGGER:-P3D\r\nACTION:DISPLAY\r\nDESCRIPTION:⏰ En 3 días: "+ev.name+"\r\nEND:VALARM\r\n";
    // Alarma el mismo día a las 9am (evento all-day: trigger PT9H desde inicio)
    ics+="BEGIN:VALARM\r\nTRIGGER:PT9H\r\nACTION:DISPLAY\r\nDESCRIPTION:🔴 Hoy: "+ev.name+"\r\nEND:VALARM\r\n";
    ics+="END:VEVENT\r\n";
  });
  ics+="END:VCALENDAR\r\n";
  const blob=new Blob([ics],{type:"text/calendar"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="Recordatorios-Finanzas.ics";
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
  showToast("📅 Abre el archivo para añadir al Calendario");
};

const BACKUP_KEYS=["fin_s","fin_b","fin_p","fin_e","fin_cp","fin_notes","fin_pagado","fin_deudas","fin_deu_extra","fin_deu_orig","fin_notif_sent"];
window.openRespaldo=function(){

    <div style="font-size:13px;color:#8E8E93;line-height:1.5;margin-bottom:18px">
      Guarda todos tus datos (ingresos, compromisos, gastos, deudas y notas) en un archivo. Si actualizas la app a una versión nueva, solo restaura el archivo y todo regresa sin recapturar nada.
    </div>
    <button class="sbtn" style="background:#30D158;margin-bottom:12px" onclick="exportBackup()">⬇️ Descargar respaldo</button>
    <div style="font-size:12px;color:#636366;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin:18px 0 10px">Restaurar desde archivo</div>
    <div style="font-size:12px;color:#8E8E93;line-height:1.5;margin-bottom:12px">
      Selecciona un archivo de respaldo (.json) que hayas guardado antes. Esto reemplazará tus datos actuales.
    </div>
    <input type="file" id="restoreFile" accept=".json,application/json" onchange="importBackup(event)" style="display:none">
    <button class="sbtn" style="background:#5E5CE6" onclick="document.getElementById('restoreFile').click()">⬆️ Restaurar respaldo</button>
    <div style="font-size:11px;color:#636366;line-height:1.5;margin-top:18px;padding:12px;background:#2C2C2E;border-radius:10px">
      💡 Tip: guarda el archivo en la app <b>Archivos</b> de tu iPhone (en iCloud Drive) para tenerlo siempre seguro y accesible.
    </div>`);
};
window.exportBackup=async function(){
  const data={_app:"Finanzas",_version:1,_date:new Date().toISOString(),data:{}};
  BACKUP_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v!==null)data.data[k]=v;});
  const json=JSON.stringify(data,null,2);
  const fecha=new Date().toISOString().slice(0,10);
  const fname="Respaldo-Finanzas-"+fecha+".json";
  // Intentar la hoja de compartir nativa (permite "Guardar en Archivos" y elegir carpeta)
  try{
    const file=new File([json],fname,{type:"application/json"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"Respaldo Finanzas"});
      showToast("✅ Elige 'Guardar en Archivos'");
      return;
    }
  }catch(err){
    if(err&&err.name==="AbortError"){return;} // el usuario canceló
  }
  // Respaldo: descarga normal
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
  showToast("✅ Respaldo descargado (carpeta Descargas)");
};
window.importBackup=function(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed.data||parsed._app!=="Finanzas"){showToast("⚠ Archivo no válido");return;}
      Object.keys(parsed.data).forEach(k=>{
        if(BACKUP_KEYS.includes(k))localStorage.setItem(k,parsed.data[k]);
      });
      // recargar variables en memoria
      sueldo=ld("fin_s")||{};bono=ld("fin_b")||{};pagos=ld("fin_p")||{};
      extras=ld("fin_e")||[];customPays=ld("fin_cp")||[];notas=ld("fin_notes")||{};
      pagado=ld("fin_pagado")||{};deudas=ld("fin_deudas")||[];deudasExtra=ld("fin_deu_extra")||[];
      closeModal();render();renderNotes();
      showToast("✅ Datos restaurados correctamente");
    }catch(err){showToast("⚠ Error al leer el archivo");}
  };
  reader.readAsText(file);
};

// ── Toast ─────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

render();
renderNotes();

// ── Recordatorios de pago (notificaciones) ───────────────
async function setupNotifications(){
  if(!("Notification" in window))return;
  updateNotifBtn();
}
function updateNotifBtn(){
  const btn=document.getElementById("notifBtn");if(!btn)return;
  if(!("Notification" in window)){btn.style.display="none";return;}
  if(Notification.permission==="granted"){btn.textContent="🔔 Avisos";btn.style.color="#30D158";btn.title="Recordatorios activados";}
  else if(Notification.permission==="denied"){btn.textContent="🔕 Avisos";btn.style.opacity="0.5";btn.title="Notificaciones bloqueadas. Activa en Ajustes de Safari.";}
  else{btn.textContent="🔔 Avisos";btn.style.opacity="0.8";btn.title="Toca para activar recordatorios de pago";}
}
window.requestNotifPermission=async function(){
  if(!("Notification" in window))return showToast("Tu navegador no soporta notificaciones");
  if(Notification.permission==="granted"){showToast("✅ Recordatorios ya activados");checkPaymentReminders();return;}
  if(Notification.permission==="denied"){showToast("🔕 Activa notificaciones en Ajustes > Safari");return;}
  const perm=await Notification.requestPermission();
  updateNotifBtn();
  if(perm==="granted"){showToast("✅ Recordatorios activados");checkPaymentReminders();}
  else showToast("🔕 No se activaron las notificaciones");
};
function notifSentKey(id,kind){return"notif-"+mk()+"-"+id+"-"+kind;}
function fireNotification(title,body){
  if(Notification.permission!=="granted")return;
  try{
    if(navigator.serviceWorker&&navigator.serviceWorker.controller){
      navigator.serviceWorker.ready.then(reg=>reg.showNotification(title,{body,icon:"data:,",badge:"data:,",tag:title+body}));
    }else{
      new Notification(title,{body});
    }
  }catch(e){}
}
function checkPaymentReminders(){
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  const sent=ld("fin_notif_sent")||{};
  let changed=false;
  // Compromisos fijos
  allPays().forEach(p=>{
    const d=resPago(p.id);
    if(!d||!d.amount||!d.day)return;
    if(isPagado(p.id))return; // ya pagado, no molestar
    const u=urgInfo(d.day);if(!u)return;
    if(u.diffDays===3){
      const k=notifSentKey(p.id,"3d");
      if(!sent[k]){
        fireNotification("⏰ Recordatorio de pago",`En 3 días debes pagar ${p.name}: ${fmt(d.amount)}`);
        sent[k]=true;changed=true;
      }
    }
    if(u.diffDays===0){
      const k=notifSentKey(p.id,"hoy");
      if(!sent[k]){
        fireNotification("🔴 Pago hoy",`Hoy es la fecha de pago de ${p.name}: ${fmt(d.amount)}`);
        sent[k]=true;changed=true;
      }
    }
  });
  // Gastos extra
  exMo().forEach(e=>{
    if(!e.day)return;
    if(isPagado("ex_"+e.id))return;
    const u=urgInfo(e.day);if(!u)return;
    if(u.diffDays===3){
      const k=notifSentKey("ex_"+e.id,"3d");
      if(!sent[k]){
        fireNotification("⏰ Recordatorio de pago",`En 3 días debes pagar ${e.desc}: ${fmt(e.amount)}`);
        sent[k]=true;changed=true;
      }
    }
    if(u.diffDays===0){
      const k=notifSentKey("ex_"+e.id,"hoy");
      if(!sent[k]){
        fireNotification("🔴 Pago hoy",`Hoy es la fecha de pago de ${e.desc}: ${fmt(e.amount)}`);
        sent[k]=true;changed=true;
      }
    }
  });
  if(changed)sv("fin_notif_sent",sent);
}
setupNotifications();
checkPaymentReminders();
setInterval(checkPaymentReminders,1000*60*60); // revisar cada hora mientras la app está abierta

// Registrar service worker mínimo (permite notificaciones mientras la PWA corre en segundo plano en iOS 16.4+)
if("serviceWorker" in navigator){
  const swCode=`self.addEventListener('notificationclick',e=>{e.notification.close();e.waitUntil(clients.matchAll({type:'window'}).then(cs=>{if(cs.length)cs[0].focus();else clients.openWindow('/');}));});`;
  const blob=new Blob([swCode],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}


if(window.visualViewport){
  const overlay=document.getElementById("overlay");
  function resizeOverlay(){
    const vv=window.visualViewport;
    overlay.style.height=vv.height+"px";
    overlay.style.top=vv.offsetTop+"px";
    const modal=overlay.querySelector(".modal");
    if(modal)modal.style.maxHeight=(vv.height*0.92)+"px";
    // Detectar teclado abierto y compactar el contenido del modal
    document.body.classList.toggle("kb-open",vv.height<window.innerHeight*0.78);
  }
  window.visualViewport.addEventListener("resize",resizeOverlay);
  window.visualViewport.addEventListener("scroll",resizeOverlay);
  resizeOverlay();
}

// Evitar que iOS desplace la página al enfocar inputs dentro del modal
window.addEventListener("scroll",()=>{
  if(document.getElementById("overlay").classList.contains("open")){
    window.scrollTo(0,0);
  }
});

// Al enfocar un input dentro del modal, hacer scroll interno del modal para mostrarlo
document.addEventListener("focusin",e=>{
  const modal=document.querySelector(".overlay.open .modal");
  if(!modal||!modal.contains(e.target))return;
  setTimeout(()=>{
    try{e.target.scrollIntoView({block:"center",behavior:"smooth"});}catch{}
  },350);
});
